

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Анкета</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center}
.page-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.content{flex:1;padding-bottom:40px}
.loading{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
.avatar-block{display:flex;flex-direction:column;align-items:center;padding:30px 20px}
.avatar-wrap{position:relative}
.avatar-circle{width:120px;height:120px;border-radius:50%;background:var(--input-bg);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;border:2px solid var(--border)}
.avatar-circle.has-new{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,77,109,0.25)}
.avatar-circle img{width:100%;height:100%;object-fit:cover}
.new-post-dot{position:absolute;top:2px;right:2px;width:18px;height:18px;background:var(--accent);border:3px solid var(--bg);border-radius:50%;display:none}
.new-post-dot.show{display:block}
.profile-name{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600;margin-top:14px}
.profile-meta{font-size:13px;color:var(--muted);margin-top:6px}
.actions-row{display:flex;gap:10px;margin-top:14px}
.message-btn{padding:10px 20px;background:var(--accent);border:none;border-radius:14px;color:white;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.bell-btn{width:38px;height:38px;border-radius:50%;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bell-btn.active{background:rgba(255,77,109,0.15);border-color:var(--accent)}
.section{padding:0 20px;margin-bottom:20px}
.section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;margin-bottom:10px}
.about-text{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:14px;line-height:1.6}
.gallery-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;padding:0 20px}
.gallery-item{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--input-bg);cursor:pointer}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover}
.gallery-item-views{position:absolute;bottom:4px;right:6px;font-size:10px;color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:8px;display:flex;align-items:center;gap:2px}
.locked-state{text-align:center;padding:50px 30px;color:var(--muted)}
.locked-state .icon{font-size:50px;margin-bottom:14px}
.locked-state p{font-size:14px;line-height:1.6}
.viewer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);z-index:100;display:none;align-items:center;justify-content:center}
.viewer-overlay.show{display:flex}
.viewer-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:var(--card);border:none;color:white;font-size:18px;cursor:pointer;z-index:101}
.viewer-content{max-width:100%;max-height:100%;padding:20px}
.viewer-content img,.viewer-content video{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px}
.viewer-content img{touch-action:none;-webkit-user-drag:none;-webkit-user-select:none;user-select:none;will-change:transform}
.viewer-views{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px}
.viewer-overlay.immersive .viewer-close,.viewer-overlay.immersive .viewer-views{display:none}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="page-title">Анкета</div>
</div>

<div id="debug-log" style="position:fixed;bottom:80px;left:0;right:0;background:rgba(0,0,0,0.85);color:#4cff9f;font-size:10px;padding:6px 10px;z-index:999;max-height:120px;overflow-y:auto;display:none"></div>

<div class="content" id="content">
  <div class="loading">⏳ Загрузка...</div>
</div>

<div class="viewer-overlay" id="viewer-overlay">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <div class="viewer-content" id="viewer-content">
    <img id="viewer-img" src="" alt="" style="display:none">
    <video id="viewer-video" src="" controls playsinline style="display:none"></video>
  </div>
  <div class="viewer-views" id="viewer-views">👁 <span id="viewer-views-count">0</span></div>
</div>

<script src="theme.js"></script>
<script src="config.js"></script>
<script src="photo-viewer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var galleryItems = [];
var bellActive = false;
var currentTargetId = null;

function dbg(msg) {
  console.log(msg);
  var el = document.getElementById('debug-log');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML += '<div>' + new Date().toLocaleTimeString() + ' ' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

function getTargetUserId() {
  var params = new URLSearchParams(window.location.search);
  return params.get('user');
}

async function getMatchId(otherUserId) {
  var { data } = await db.from('matches').select('id')
    .or('and(user1.eq.' + currentUser.id + ',user2.eq.' + otherUserId + '),and(user1.eq.' + otherUserId + ',user2.eq.' + currentUser.id + ')')
    .single();
  return data ? data.id : null;
}

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;

  var targetId = getTargetUserId();
  if (!targetId) { window.location.href = 'feed.html'; return; }
  currentTargetId = targetId;

  var { data: profile } = await db.from('profiles').select('*').eq('id', targetId).single();
  if (!profile) {
    document.getElementById('content').innerHTML = '<div class="loading">Анкета не найдена</div>';
    return;
  }

  var matchId = await getMatchId(targetId);
  var visibility = profile.profile_visibility || 'matches';
  var canSeeFull = true;

  if (visibility === 'none') {
    canSeeFull = false;
  } else if (visibility === 'matches') {
    canSeeFull = !!matchId;
  }

  var hasNew = await checkHasNewPost(targetId);

  renderProfile(profile, canSeeFull, targetId, matchId, hasNew);
  await loadBellState(targetId);
  await markProfileSeen(targetId);
}

async function checkHasNewPost(targetId) {
  var { data: lastPhoto, error: e1 } = await db.from('profile_photos')
    .select('created_at')
    .eq('user_id', targetId)
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle();

  dbg('lastPhoto:', lastPhoto, e1 ? e1.message : '');
  if (!lastPhoto) return false;

  var { data: seen, error: e2 } = await db.from('profile_seen')
    .select('last_seen_at')
    .eq('viewer_id', currentUser.id)
    .eq('target_user_id', targetId)
    .maybeSingle();

  dbg('seen:', seen, e2 ? e2.message : '');
  if (!seen) return true;

  var result = new Date(lastPhoto.created_at) > new Date(seen.last_seen_at);
  dbg('hasNew:', result, 'lastPhoto.created_at:', lastPhoto.created_at, 'seen.last_seen_at:', seen.last_seen_at);
  return result;
}

function renderProfile(profile, canSeeFull, targetId, matchId, hasNew) {
  var contentEl = document.getElementById('content');
  var avatarClass = hasNew ? 'avatar-circle has-new' : 'avatar-circle';
  var dotClass = hasNew ? 'new-post-dot show' : 'new-post-dot';

  var html = '<div class="avatar-block">' +
    '<div class="avatar-wrap">' +
      '<div class="' + avatarClass + '" id="profile-avatar-container">' +
        (profile.avatar_url ? '<img src="' + profile.avatar_url + '" alt="">' : '👤') +
      '</div>' +
      '<div class="' + dotClass + '" id="profile-new-dot"></div>' +
    '</div>' +
    '<div class="profile-name">' + (profile.name || 'Аноним') + ', ' + (profile.age || '') + '</div>' +
    '<div class="profile-meta">📍 ' + (profile.city || 'Москва') + '</div>' +
    '<div class="actions-row">' +
      '<button class="bell-btn" id="bell-btn" onclick="toggleBell()">🔔</button>' +
      '<button class="message-btn" onclick="openChat(\'' + targetId + '\')">💬 Написать сообщение</button>' +
    '</div>' +
  '</div>';

  html += '<div class="section">' +
    '<div class="section-title">О себе</div>' +
    '<div class="about-text">' + (profile.about || 'Нет описания') + '</div>' +
  '</div>';

  if (canSeeFull) {
    html += '<div class="section"><div class="section-title">Галерея</div></div>' +
            '<div class="gallery-grid" id="gallery-grid"></div>';
    contentEl.innerHTML = html;
    loadGallery(targetId);
  } else {
    html += '<div class="locked-state">' +
      '<div class="icon">🔒</div>' +
      '<p>Галерея доступна только после взаимной симпатии</p>' +
    '</div>';
    contentEl.innerHTML = html;
  }
}

async function loadGallery(targetId) {
  var { data, error } = await db.from('profile_photos')
    .select('*')
    .eq('user_id', targetId)
    .order('created_at', { ascending: false });


if (error) { dbg('Gallery error: ' + error.message); return; }
galleryItems = data || [];
var grid = document.getElementById('gallery-grid');
if (!grid) return;
grid.innerHTML = '';
galleryItems.forEach(function(item, index) {
var itemEl = document.createElement('div');
itemEl.className = 'gallery-item';
itemEl.onclick = function() { openGalleryViewer(index); };
var mediaHtml = '';
if (item.media_type === 'video') {
mediaHtml = '';
} else {
mediaHtml = '';
}
itemEl.innerHTML = mediaHtml +
'👁 ' + (item.views_count || 0) + '';
grid.appendChild(itemEl);
});
}
async function openGalleryViewer(index) {
if (typeof openViewer === 'function') {
openViewer(index);
} else {
var item = galleryItems[index];
if (!item) return;
var overlay = document.getElementById('viewer-overlay');
var img = document.getElementById('viewer-img');
var video = document.getElementById('viewer-video');
var count = document.getElementById('viewer-views-count');
if (item.media_type === 'video') {
img.style.display = 'none';
video.src = item.url;
video.style.display = 'block';
} else {
video.style.display = 'none';
img.src = item.url;
img.style.display = 'block';
}
if (count) count.innerText = item.views_count || 0;
if (overlay) overlay.classList.add('show');
}
dbg('gridBadge found: ' + galleryItems[index].id);
await db.rpc('increment_media_views', { photo_id: galleryItems[index].id });
dbg('media_views insert / count updated');
}
function closeViewer() {
var overlay = document.getElementById('viewer-overlay');
var video = document.getElementById('viewer-video');
if (video) { video.pause(); video.src = ''; }
if (overlay) overlay.classList.remove('show');
}
async function loadBellState(targetId) {
var { data } = await db.from('subscriptions')
.select('id')
.eq('user_id', currentUser.id)
.eq('target_id', targetId)
.maybeSingle();
bellActive = !!data;
var btn = document.getElementById('bell-btn');
if (btn) {
if (bellActive) btn.classList.add('active');
else btn.classList.remove('active');
}
}
async function toggleBell() {
var btn = document.getElementById('bell-btn');
if (!btn || !currentTargetId) return;
if (bellActive) {
await db.from('subscriptions').delete().eq('user_id', currentUser.id).eq('target_id', currentTargetId);
bellActive = false;
btn.classList.remove('active');
} else {
await db.from('subscriptions').insert({ user_id: currentUser.id, target_id: currentTargetId });
bellActive = true;
btn.classList.add('active');
}
}
function openChat(targetId) {
window.location.href = 'chat.html?chat=' + targetId;
}
async function markProfileSeen(targetId) {
dbg('markProfileSeen: ' + targetId);
var avatarContainer = document.getElementById('profile-avatar-container');
var newDot = document.getElementById('profile-new-dot');
if (avatarContainer) avatarContainer.classList.remove('has-new');
if (newDot) newDot.classList.remove('show');
try {
var now = new Date().toISOString();
var { data: existing } = await db.from('profile_seen')
.select('id')
.eq('viewer_id', currentUser.id)
.eq('target_user_id', targetId)
.maybeSingle();
if (existing) {
await db.from('profile_seen')
.update({ last_seen_at: now })
.eq('id', existing.id);
} else {
await db.from('profile_seen')
.insert({
viewer_id: currentUser.id,
target_user_id: targetId,
last_seen_at: now
});
}
} catch(e) {
console.error(e);
}
}
window.onload = init;
