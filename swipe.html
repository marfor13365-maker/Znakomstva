<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blizko - Знакомства</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;position:fixed;top:0;left:0;right:0;background:var(--bg);z-index:10}
.logo{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.filter-btn{background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:6px 12px;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer}
.card-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:360px;height:520px;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.5);transition:transform 0.1s;touch-action:none}
.card.dragging{transition:none}
.card img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,0.85))}
.card-name{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600;margin-bottom:4px}
.card-meta{font-size:13px;color:var(--muted);margin-bottom:12px}
.card-bio{font-size:14px;line-height:1.5;margin-bottom:16px}
.card-actions{display:flex;gap:12px}
.card-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.like-btn{background:var(--accent);color:white}
.skip-btn{background:transparent;border:1px solid var(--border);color:var(--text)}
.card-actions button:active{opacity:0.8}
.label{position:absolute;top:40px;padding:8px 16px;border-radius:8px;font-family:'Unbounded',sans-serif;font-size:24px;font-weight:600;opacity:0;transition:opacity 0.2s}
.like-label{right:20px;background:rgba(76,255,159,0.2);color:#4cff9f;border:2px solid #4cff9f}
.nope-label{left:20px;background:rgba(255,107,107,0.2);color:#ff6b6b;border:2px solid #ff6b6b}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty-state .icon{font-size:60px;margin-bottom:16px}
.empty-state p{font-size:14px;color:var(--muted);line-height:1.6}
.bottombar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:var(--bg);z-index:10;gap:6px}
.bottom-btn{background:var(--input-bg);border:none;color:var(--muted);cursor:pointer;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10px;transition:all 0.2s;flex:1;border-radius:16px}
.bottom-btn.active{color:var(--accent);font-weight:600}
.bottom-btn .ico{font-size:20px}
.like-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.like-modal.show{display:flex}
.like-modal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:340px}
.like-modal-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:12px}
.like-modal textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;height:80px;margin-bottom:16px}
.like-modal-actions{display:flex;gap:10px}
.like-modal-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.like-modal-actions .send{background:var(--accent);color:white}
.like-modal-actions .cancel{background:transparent;border:1px solid var(--border);color:var(--text)}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Blizko</div>
  <button class="filter-btn" onclick="openFilters()">⚙️ Фильтры</button>
</div>

<div class="card-wrap" id="card-wrap">
  <div class="loading" style="padding:40px;text-align:center;color:var(--muted)">⏳ Загрузка...</div>
</div>

<div class="bottombar">
  <button class="bottom-btn" onclick="window.location.href='feed.html'">
    <span class="ico">🏠</span><span>Лента</span>
  </button>
  <button class="bottom-btn active" onclick="window.location.href='swipe.html'">
    <span class="ico">😍</span><span>Знакомства</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='likes.html'">
    <span class="ico">💖</span><span>Лайки</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='matches.html'">
    <span class="ico">💬</span><span>Чаты</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='profile.html'">
    <span class="ico">👤</span><span>Профиль</span>
  </button>
</div>

<div class="like-modal" id="like-modal">
  <div class="like-modal-card">
    <div class="like-modal-title">❤️ Понравился(ась)?</div>
    <textarea id="like-comment" placeholder="Напиши что-нибудь (необязательно)..."></textarea>
    <div class="like-modal-actions">
      <button class="cancel" onclick="closeLikeModal()">Отмена</button>
      <button class="send" onclick="sendLike()">Лайкнуть</button>
    </div>
  </div>
</div>

<script src="theme.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = createBlizkoClient();
var currentUser = null;
var profiles = [];
var currentIndex = 0;
var isDragging = false;
var startX = 0, startY = 0;
var pendingLikeId = null;

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;
  await loadProfiles();
}

async function loadProfiles() {
  var wrap = document.getElementById('card-wrap');
  var { data, error } = await db.from('profiles')
    .select('*, profile_photos(photo_url)')
    .neq('id', currentUser.id)
    .limit(20);
  
  if (error) { console.error(error); wrap.innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>'; return; }
  
  profiles = data || [];
  if (profiles.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">😴</div><p>Пока никого нет рядом.<br>Попробуй позже!</p></div>';
    return;
  }
  
  currentIndex = 0;
  renderCard();
}

function renderCard() {
  var wrap = document.getElementById('card-wrap');
  if (currentIndex >= profiles.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>Все анкеты просмотрены!<br>Заходи позже — появятся новые.</p></div>';
    return;
  }
  
  var p = profiles[currentIndex];
  var photos = p.profile_photos || [];
  var photoUrl = photos.length > 0 ? photos[0].photo_url : '';
  var age = p.age ? ', ' + p.age : '';
  var city = p.city ? '📍 ' + p.city : '';
  
  wrap.innerHTML =
    '<div class="card" id="current-card">' +
      (photoUrl ? '<img src="' + photoUrl + '" alt="">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px">👤</div>') +
      '<div class="like-label label" id="like-label">ЛАЙК</div>' +
      '<div class="nope-label label" id="nope-label">НЕТ</div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + (p.name || 'Пользователь') + age + '</div>' +
        '<div class="card-meta">' + city + '</div>' +
        '<div class="card-bio">' + (p.bio || '') + '</div>' +
        '<div class="card-actions">' +
          '<button class="skip-btn" onclick="skipProfile()">👎 Пропустить</button>' +
          '<button class="like-btn" onclick="openLikeModal()">❤️ Лайк</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  
  setupDrag(document.getElementById('current-card'));
}

function setupDrag(card) {
  if (!card) return;
  card.addEventListener('mousedown', dragStart);
  card.addEventListener('touchstart', dragStart, {passive: true});
  card.addEventListener('mousemove', dragMove);
  card.addEventListener('touchmove', dragMove, {passive: true});
  card.addEventListener('mouseup', dragEnd);
  card.addEventListener('touchend', dragEnd);
  card.addEventListener('touchcancel', dragEnd);
  card.addEventListener('mouseleave', dragEnd);
}

function dragStart(e) {
  if (e.target.closest('.card-actions')) return;
  isDragging = true;
  var card = e.currentTarget;
  card.classList.add('dragging');
  var pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX;
  startY = pt.clientY;
}

function dragMove(e) {
  if (!isDragging) return;
  var card = document.getElementById('current-card');
  if (!card) { isDragging = false; return; }
  var pt = e.touches ? e.touches[0] : e;
  var dx = pt.clientX - startX;
  var dy = pt.clientY - startY;
  card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (dx * 0.1) + 'deg)';
  var ll = document.getElementById('like-label');
  var nl = document.getElementById('nope-label');
  if (ll) ll.style.opacity = dx > 20 ? Math.min((dx - 20) / 80, 1) : 0;
  if (nl) nl.style.opacity = dx < -20 ? Math.min((-dx - 20) / 80, 1) : 0;
}

function dragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  var card = document.getElementById('current-card');
  if (!card) return;
  card.classList.remove('dragging');
  
  var m = card.style.transform.match(/translate\(([^,]+)px/);
  var dx = m ? parseFloat(m[1]) : 0;
  var mY = card.style.transform.match(/translate\([^,]+,\s*([^)]+)px/);
  var dy = mY ? parseFloat(mY[1]) : 0;
  
  card.style.transform = '';
  var ll = document.getElementById('like-label');
  var nl = document.getElementById('nope-label');
  if (ll) ll.style.opacity = 0;
  if (nl) nl.style.opacity = 0;
  
  if (dx > 100) { openLikeModal(); }
  else if (dx < -100) { swipe('left'); }
  else if (dy < -150) { nextProfile(); }
}

function swipe(direction) {
  var card = document.getElementById('current-card');
  if (!card) return;
  card.style.transition = 'transform 0.3s, opacity 0.3s';
  card.style.transform = 'translate(' + (direction === 'left' ? '-120%' : '120%') + 'px, 0) rotate(' + (direction === 'left' ? -20 : 20) + 'deg)';
  card.style.opacity = '0';
  setTimeout(nextProfile, 300);
}

function nextProfile() {
  currentIndex++;
  renderCard();
}

function skipProfile() {
  swipe('left');
}

function openLikeModal() {
  if (currentIndex >= profiles.length) return;
  pendingLikeId = profiles[currentIndex].id;
  document.getElementById('like-comment').value = '';
  document.getElementById('like-modal').classList.add('show');
}

function closeLikeModal() {
  document.getElementById('like-modal').classList.remove('show');
  pendingLikeId = null;
}

async function sendLike() {
  if (!pendingLikeId) return;
  var comment = document.getElementById('like-comment').value.trim();
  
  await db.from('likes').upsert({
    from_user: currentUser.id,
    to_user: pendingLikeId,
    is_like: true,
    comment: comment || null
  }, { onConflict: 'from_user,to_user' });
  
  var { data: matchData } = await db.from('matches').select('*')
    .or('and(user1.eq.' + currentUser.id + ',user2.eq.' + pendingLikeId + '),and(user1.eq.' + pendingLikeId + ',user2.eq.' + currentUser.id + ')')
    .maybeSingle();
  
  closeLikeModal();
  
  if (matchData) {
    setTimeout(function() {
      if (confirm('🎉 Это взаимный лайк! Перейти в чат?')) {
        window.location.href = 'chat.html?match=' + matchData.id;
      }
    }, 300);
  } else {
    nextProfile();
  }
}

function openFilters() {
  alert('Фильтры скоро будут!');
}

init();
</script>
</body>
</html>
