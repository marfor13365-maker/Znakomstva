<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Лента (отладка)</title>
<style>
/* Твой полный CSS — вставь его сюда (он у тебя уже есть, я не буду дублировать для краткости) */
</style>
</head>
<body>
<!-- Твой полный HTML (все модалки, шапка, нижняя панель) — вставь сюда -->

<!-- Отладочная панель -->
<div id="debug-panel" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.92);color:#0f0;padding:12px 16px;border-radius:10px;font-size:12px;font-family:monospace;z-index:99999;max-width:90vw;max-height:50vh;overflow-y:auto;border:1px solid #444;pointer-events:none;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,0.9);">
  <div>🔍 Отладка feed.html</div>
  <div id="debug-log">Ожидание...</div>
</div>

<script src="theme.js"></script>
<script src="photo-viewer.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Отладка =====
const debugLog = document.getElementById('debug-log');
let debugCounter = 0;

function addDebugLine(text, className = '') {
  debugCounter++;
  const line = document.createElement('div');
  line.className = className;
  line.textContent = `#${debugCounter} ${text}`;
  debugLog.appendChild(line);
  debugLog.scrollTop = debugLog.scrollHeight;
}

// Перехват ошибок
window.onerror = function(msg, url, line, col, error) {
  addDebugLine(`ОШИБКА: ${msg} (${url}:${line})`, 'error');
  return false;
};

addDebugLine('Запуск feed.html');

// ===== Создание клиента =====
var db;
try {
  db = createBlizkoClient();
  addDebugLine('Supabase клиент создан', 'session');
} catch (e) {
  addDebugLine('Ошибка createBlizkoClient: ' + e.message, 'error');
  // Показываем сообщение на странице
  document.getElementById('grid-wrap').innerHTML = `
    <div class="empty-state" style="padding:60px 20px;">
      <div class="icon">❌</div>
      <p style="font-size:16px;color:var(--text);">Ошибка инициализации</p>
      <p style="font-size:14px;color:var(--muted);">${e.message}</p>
      <button class="btn" style="max-width:200px;margin:20px auto 0;" onclick="location.reload()">Обновить</button>
    </div>
  `;
  throw e;
}

// ===== Остальные переменные =====
var BACKEND_URL = 'https://vector-chat-api.onrender.com';
var currentUser = null;
var pendingPhotoUrl = null;
var pendingMediaType = 'photo';
var posts = [];
var lastSeenMap = {};
var followedIds = {};
var matchIds = {};
var myLikesGiven = {};
var currentViewedAuthorId = null;
var currentViewedPostId = null;
var photoViewerAttached = false;

// ===== ФУНКЦИИ (все твои существующие — я их не меняю, только добавляю логи) =====
// Вставь сюда все свои функции: timeAgo, loadFollowedAndMatches, loadSeenData, hasNewPost, markAuthorSeen,
// loadFeed, updateDotsForUser, openUserProfile, openPost, ensurePhotoViewerAttached, recordAndShowViews,
// loadFollowStatus, toggleFollow, loadPostLikes, togglePostLike, loadComments, sendComment, deleteComment,
// toggleCommentsEnabled, sharePost, deleteCurrentPost, closeModal, openMatchSheet, closeMatchSheet,
// sendMatchLike, openUpload, closeUpload, handlePostPhoto, publishPost, notifyPostSubscribers

// Для краткости я пропускаю их здесь, но ты вставь свой полный код функций (они не меняются).

// ===== ЕДИНСТВЕННО ИЗМЕНЁННЫЙ init с отладкой =====
async function init() {
  addDebugLine('init() запущен');
  try {
    addDebugLine('Запрашиваю сессию...');
    var r = await db.auth.getSession();
    addDebugLine('getSession выполнен', 'session');
    if (!r.data.session) {
      addDebugLine('Сессии НЕТ', 'error');
      var wrap = document.getElementById('grid-wrap');
      wrap.innerHTML = `
        <div class="empty-state" style="padding:60px 20px;">
          <div class="icon">🔒</div>
          <p style="font-size:16px;color:var(--text);margin-bottom:8px;">Сессия не найдена</p>
          <p style="font-size:14px;color:var(--muted);margin-bottom:20px;">Пожалуйста, войдите заново</p>
          <button class="btn" style="max-width:200px;margin:0 auto;" onclick="window.location.href='index.html'">Войти</button>
        </div>
      `;
      return;
    }
    currentUser = r.data.session.user;
    addDebugLine(`Сессия ЕСТЬ: ${currentUser.email}`, 'session');
    
    // Загружаем лайки
    addDebugLine('Загружаю лайки...');
    var { data: myLikes } = await db.from('likes').select('to_user, is_like').eq('from_user', currentUser.id);
    (myLikes || []).forEach(function(l) { if (l.is_like) myLikesGiven[l.to_user] = true; });
    addDebugLine(`Лайков: ${Object.keys(myLikesGiven).length}`);

    addDebugLine('Загружаю подписки и мэтчи...');
    await loadFollowedAndMatches();
    addDebugLine(`Подписок: ${Object.keys(followedIds).length}, Мэтчей: ${Object.keys(matchIds).length}`);

    addDebugLine('Загружаю данные просмотров...');
    await loadSeenData();
    addDebugLine(`Просмотров: ${Object.keys(lastSeenMap).length}`);

    addDebugLine('Загружаю ленту...');
    await loadFeed();
    addDebugLine('Лента загружена успешно!', 'session');
  } catch (e) {
    addDebugLine(`Ошибка в init: ${e.message}`, 'error');
    console.error(e);
    var wrap = document.getElementById('grid-wrap');
    wrap.innerHTML = `
      <div class="empty-state" style="padding:60px 20px;">
        <div class="icon">⚠️</div>
        <p style="font-size:16px;color:var(--text);">Ошибка загрузки</p>
        <p style="font-size:14px;color:var(--muted);">${e.message}</p>
        <button class="btn" style="max-width:200px;margin:20px auto 0;" onclick="location.reload()">Обновить</button>
      </div>
    `;
  }
}

// ===== Запуск =====
addDebugLine('Вызываю init()...');
init().then(() => addDebugLine('init() завершён')).catch(e => addDebugLine('init() упал: ' + e.message, 'error'));
</script>
</body>
</html>
