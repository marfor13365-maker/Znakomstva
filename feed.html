<html lang="ru">
<head>

<style>

</head>
<body>
<div class="topbar">
  <div class="logo">Blizko</div>
  <button class="add-btn" onclick="openUpload()">+</button>
</div>

<div id="grid-wrap">
  <div class="loading">⏳ Загрузка...</div>
</div>

<div class="bottombar">
  <button class="bottom-btn active" onclick="window.location.href='feed.html'">
    <span class="ico">🏠</span><span>Лента</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='swipe.html'">
    <span class="ico">😍</span><span>Знакомства</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='likes.html'">
    <span class="ico">💖</span><span>Лайки</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='matches.html'">
    <span class="ico">💬</span><span>Чаты</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='profile.html'">
    <span class="ico">👤</span><span>Профиль</span>
  </button>
</div>

<!-- Модальные окна (все, что у тебя есть) -->
<!-- ... скопируй их из своего файла ... -->

<script src="theme.js"></script>
<script src="photo-viewer.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = createBlizkoClient();
var BACKEND_URL = 'https://vector-chat-api.onrender.com';
var currentUser = null;
var pendingPhotoUrl = null;
var pendingMediaType = 'photo';
var posts = [];
var lastSeenMap = {};
var followedIds = {};
var matchIds = {};
var myLikesGiven = {};
var currentViewedAuthorId = null;
var currentViewedPostId = null;
var photoViewerAttached = false;

// ===== ВСЕ ТВОИ СУЩЕСТВУЮЩИЕ ФУНКЦИИ =====
// Скопируй их сюда из своего рабочего файла:
// timeAgo, loadFollowedAndMatches, loadSeenData, hasNewPost, markAuthorSeen, loadFeed,
// updateDotsForUser, openUserProfile, openPost, ensurePhotoViewerAttached, recordAndShowViews,
// loadFollowStatus, toggleFollow, loadPostLikes, togglePostLike, loadComments, sendComment,
// deleteComment, toggleCommentsEnabled, sharePost, deleteCurrentPost, closeModal, openMatchSheet,
// closeMatchSheet, sendMatchLike, openUpload, closeUpload, handlePostPhoto, publishPost,
// notifyPostSubscribers

// ===== ИНИЦИАЛИЗАЦИЯ (без редиректа) =====
async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) {
    // Показываем кнопку входа
    var wrap = document.getElementById('grid-wrap');
    if (wrap) {
      wrap.innerHTML = `
        <div class="empty-state" style="padding:60px 20px;">
          <div class="icon">🔒</div>
          <p style="font-size:16px;color:var(--text);margin-bottom:8px;">Сессия истекла</p>
          <p style="font-size:14px;color:var(--muted);margin-bottom:20px;">Пожалуйста, войдите заново</p>
          <button class="btn" style="max-width:200px;margin:0 auto;" onclick="window.location.href='index.html'">Войти</button>
        </div>
      `;
    }
    return;
  }
  currentUser = r.data.session.user;

  // Загружаем данные
  var { data: myLikes } = await db.from('likes').select('to_user, is_like').eq('from_user', currentUser.id);
  (myLikes || []).forEach(function(l) { if (l.is_like) myLikesGiven[l.to_user] = true; });

  await loadFollowedAndMatches();
  await loadSeenData();
  await loadFeed();
}

init();
</script>
</body>
</html>
