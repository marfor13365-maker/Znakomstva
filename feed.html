<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Лента</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px;--green:#4cff9f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 30px;position:fixed;top:0;left:0;right:0;background:transparent;z-index:10}
.logo{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6))}
.add-btn{background:var(--accent);border:none;color:white;font-size:22px;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,0.5)}
.add-btn:active{opacity:0.7}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:2px;padding-bottom:90px}
.grid-item{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--card)}
.grid-item img{width:100%;height:100%;object-fit:cover;display:block}
.grid-item video{width:100%;height:100%;object-fit:cover;display:block}
.grid-item:active{opacity:0.85}
.grid-item .overlay{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,0.75))}
.overlay-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.grid-views{font-size:10px;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:2px;flex-shrink:0}
.grid-new-dot{position:absolute;top:6px;right:6px;width:12px;height:12px;background:var(--accent);border:2px solid rgba(0,0,0,0.6);border-radius:50%;z-index:2}
.grid-item .user-name{font-size:11px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.no-photo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--input-bg)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty-state .icon{font-size:60px;margin-bottom:16px}
.empty-state p{font-size:14px;color:var(--muted);line-height:1.6}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);z-index:100;display:none;flex-direction:column}
.modal.show{display:flex}
.modal-topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;flex-shrink:0;flex-wrap:wrap}
.modal-back{background:none;border:none;color:white;font-size:24px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
.modal-user{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer}
.modal-user:hover .modal-name{color:var(--accent)}
.modal-avatar{width:38px;height:38px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.modal-avatar img{width:100%;height:100%;object-fit:cover}
.modal-name{font-weight:600;font-size:14px;transition:color 0.2s}
.modal-city{font-size:12px;color:var(--muted)}
.profile-link-btn{background:var(--accent);border:none;color:white;font-size:11px;font-weight:600;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;transition:opacity 0.2s;white-space:nowrap}
.profile-link-btn:active{opacity:0.7}
.follow-btn{background:var(--accent);border:none;color:white;font-size:11px;font-weight:600;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;white-space:nowrap}
.follow-btn.following{background:transparent;border:1px solid var(--border);color:var(--muted)}
.modal-photo{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0 2px;position:relative}
.modal-photo img{max-width:100%;max-height:100%;object-fit:contain;touch-action:none;-webkit-user-drag:none;-webkit-user-select:none;user-select:none;will-change:transform}
.modal-footer{padding:16px 20px;flex-shrink:0}
.modal-caption{font-size:14px;color:var(--text);line-height:1.5}
.modal-time{font-size:11px;color:var(--muted);margin-top:6px}
.modal-views{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}
#view-modal.immersive .modal-topbar,#view-modal.immersive .modal-footer{display:none}
#view-modal.immersive .modal-photo{flex:1;height:100vh}
.immersive-caption-overlay{position:absolute;bottom:0;left:0;right:0;padding:16px 20px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(0,0,0,0.75));color:#fff;font-size:14px;line-height:1.5;display:none;z-index:5;pointer-events:none}
.immersive-caption-overlay.show{display:block}
.match-btn{margin-top:16px;width:100%;padding:14px;background:var(--accent);border:none;border-radius:14px;color:white;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.match-btn:active{opacity:0.8}
.match-sent{margin-top:16px;text-align:center;color:var(--green);font-size:13px;font-weight:600}
.post-actions-row{display:flex;gap:10px;margin-top:12px}
.like-comment-row{display:flex;align-items:center;margin-bottom:10px}
.like-btn{background:none;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);padding:4px 0}
.like-btn#liked{color:var(--accent)}
.like-btn span{font-size:14px;font-weight:600;color:var(--muted)}
.comments-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.comments-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;font-weight:500}
.comment-item{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--input-bg);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.comment-avatar img{width:100%;height:100%;object-fit:cover}
.comment-body{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 12px}
.comment-name{font-size:12px;font-weight:600;margin-bottom:2px}
.comment-text{font-size:13px;line-height:1.4}
.comment-del{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px;flex-shrink:0}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-input-row input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:18px;padding:10px 14px;color:var(--text);font-size:13px;outline:none}
.comment-input-row input:focus{border-color:var(--accent)}
.comment-input-row button{background:var(--accent);border:none;color:white;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:14px;flex-shrink:0}
.comments-disabled-msg{font-size:12px;color:var(--muted);text-align:center;padding:8px 0}
#toggle-comments-btn.disabled-state{color:var(--accent);border-color:var(--accent)}
.icon-action-btn-row{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;background:var(--input-bg);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:18px;cursor:pointer}
.icon-action-btn-row span{font-size:10px;color:var(--muted)}
.icon-action-btn-row:active{background:var(--border)}
#delete-action-btn{color:var(--accent);border-color:var(--accent)}
.modal-photo{overflow:hidden;touch-action:pan-y}
.match-sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:300;display:none;align-items:flex-end;justify-content:center}
.match-sheet-overlay.show{display:flex}
.match-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:24px 20px calc(24px + env(safe-area-inset-bottom));border-top:1px solid var(--border)}
.match-sheet-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;text-align:center}
.match-comment-input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;height:70px;margin-bottom:14px;transition:border-color 0.2s}
.match-comment-input:focus{border-color:var(--accent)}
.match-sheet-actions{display:flex;gap:10px}
.match-sheet-actions .btn{margin:0;width:auto;flex:1}
.btn{padding:14px 32px;background:var(--accent);border:none;border-radius:12px;color:white;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.upload-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.upload-modal.show{display:flex}
.upload-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.upload-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600}
.publish-btn{background:var(--accent);border:none;color:white;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;padding:9px 18px;border-radius:10px;cursor:pointer}
.publish-btn:disabled{opacity:0.4;cursor:not-allowed}
.upload-content{flex:1;display:flex;flex-direction:column;padding:20px;gap:16px;overflow-y:auto}
.photo-pick{width:100%;aspect-ratio:1;background:var(--input-bg);border:2px dashed var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:border-color 0.2s}
.photo-pick:active{border-color:var(--accent)}
.pick-hint{font-size:36px;margin-bottom:8px}
.pick-text{font-size:13px;color:var(--muted)}
.caption-input{background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;height:80px;transition:border-color 0.2s}
.caption-input:focus{border-color:var(--accent)}
.upload-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;display:none}
.upload-bar{height:100%;background:var(--accent);width:0%;transition:width 0.3s}
.bottombar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:transparent;z-index:10;gap:6px}
.bottom-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:rgba(255,255,255,0.85);cursor:pointer;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10px;transition:opacity 0.2s;flex:1;border-radius:16px;box-shadow:0 2px 10px rgba(255,77,109,0.4)}
.bottom-btn.active{color:white;font-weight:600;opacity:1}
.bottom-btn:not(.active){opacity:0.85}
.bottom-btn .ico{font-size:22px}
input[type="file"]{display:none}
.loading{padding:40px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var BACKEND_URL = 'https://vector-chat-api.onrender.com';
var currentUser = null;
var pendingPhotoUrl = null;
var pendingMediaType = 'photo';
var posts = [];
var lastSeenMap = {};

function timeAgo(dateStr) {
  var d = new Date(dateStr);
  var now = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
  if (diff < 86400*7) return Math.floor(diff/86400) + ' д назад';
  return d.toLocaleDateString('ru-RU');
}

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;

  var { data: myLikes } = await db.from('likes').select('to_user, is_like').eq('from_user', currentUser.id);
  (myLikes || []).forEach(function(l) { if (l.is_like) myLikesGiven[l.to_user] = true; });

  await loadSeenData();
  await loadFeed();
}

async function loadSeenData() {
  var { data: seen } = await db.from('profile_seen').select('target_user_id, last_seen_at').eq('viewer_id', currentUser.id);
  lastSeenMap = {};
  (seen || []).forEach(function(s) { lastSeenMap[s.target_user_id] = s.last_seen_at; });
  
  var keys = Object.keys(localStorage);
  keys.forEach(function(key) {
    if (key.startsWith('profile_seen_')) {
      var userId = key.replace('profile_seen_', '');
      var seenAt = localStorage.getItem(key);
      if (!lastSeenMap[userId] || new Date(lastSeenMap[userId]) < new Date(seenAt)) {
        lastSeenMap[userId] = seenAt;
      }
    }
  });
}

function hasNewPost(userId, postCreatedAt) {
  if (userId === currentUser.id) return false;
  var seenAt = lastSeenMap[userId];
  if (!seenAt) return true;
  return new Date(postCreatedAt) > new Date(seenAt);
}

async function markAuthorSeen(authorId) {
  if (!authorId || authorId === currentUser.id) return;
  var now = new Date().toISOString();
  lastSeenMap[authorId] = now;
  localStorage.setItem('profile_seen_' + authorId, now);
  updateDotsForUser(authorId);
  await db.from('profile_seen').upsert({
    viewer_id: currentUser.id,
    target_user_id: authorId,
    last_seen_at: now
  }, { onConflict: 'viewer_id,target_user_id' });
}

async function loadFeed() {
  var wrap = document.getElementById('grid-wrap');
  var { data, error } = await db.from('posts')
    .select('*, profiles(name, city, photo_url)')
    .order('created_at', { ascending: false })
    .limit(60);
  if (error) { console.error('loadFeed error:', error); wrap.innerHTML = '<div class="loading">Ошибка загрузки</div>'; return; }

  posts = data || [];

  if (posts.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">📸</div><p>Пока нет фото.<br>Будь первым — добавь своё!</p></div>';
    return;
  }

  var postIds = posts.map(function(p) { return p.id; });
  var viewCounts = {};
  if (postIds.length > 0) {
    var { data: viewsData } = await db.from('media_views')
      .select('item_id')
      .eq('item_type', 'post')
      .in('item_id', postIds);
    (viewsData || []).forEach(function(v) { viewCounts[v.item_id] = (viewCounts[v.item_id] || 0) + 1; });
  }

  var grid = document.createElement('div');
  grid.className = 'grid';
  posts.forEach(function(post, idx) {
    var item = document.createElement('div');
    item.className = 'grid-item';
    item.setAttribute('data-post-id', post.id);
    item.setAttribute('data-user-id', post.user_id);
    item.setAttribute('data-created-at', post.created_at);
    item.onclick = function() { openPost(idx); };
    
    if (post.photo_url) {
      var mediaHtml = post.media_type === 'video'
        ? '<video src="' + post.photo_url + '" muted></video>'
        : '<img src="' + post.photo_url + '" loading="lazy">';
      
      var hasNew = hasNewPost(post.user_id, post.created_at);
      var dotHtml = hasNew ? '<div class="grid-new-dot"></div>' : '';
      var viewsCount = viewCounts[post.id] || 0;
      
      item.innerHTML = mediaHtml + dotHtml +
        '<div class="overlay"><div class="overlay-row"><div class="user-name">' + ((post.profiles && post.profiles.name) ? post.profiles.name : '') + '</div>' +
        '<div class="grid-views">👁 ' + viewsCount + '</div></div></div>';
    } else {
      item.innerHTML = '<div class="no-photo">📷</div>';
    }
    grid.appendChild(item);
  });
  wrap.innerHTML = '';
  wrap.appendChild(grid);
}

function updateDotsForUser(userId) {
  var items = document.querySelectorAll('.grid-item[data-user-id="' + userId + '"]');
  items.forEach(function(item) {
    var createdAt = item.getAttribute('data-created-at');
    var dot = item.querySelector('.grid-new-dot');
    if (!dot || !createdAt) return;
    var hasNew = hasNewPost(userId, createdAt);
    dot.style.display = hasNew ? 'block' : 'none';
  });
}

var currentViewedAuthorId = null;
var myLikesGiven = {};
var currentViewedPostId = null;

async function openUserProfile() {
  var userId = currentViewedAuthorId;
  if (!userId) return;
  if (userId === currentUser.id) {
    window.location.href = 'profile.html';
    return;
  }
  
  var { data: profile } = await db.from('profiles').select('profile_visibility').eq('id', userId).single();
  if (!profile) { alert('Профиль не найден'); return; }
  
  var visibility = profile.profile_visibility || 'matches';
  
  if (visibility === 'none') {
    alert('🔒 Этот пользователь закрыл свою анкету для всех.');
    return;
  }
  
  if (visibility === 'matches') {
    var { data: match } = await db.from('matches')
      .select('id')
      .or('and(user1.eq.' + currentUser.id + ',user2.eq.' + userId + '),and(user1.eq.' + userId + ',user2.eq.' + currentUser.id + ')')
      .maybeSingle();
    
    if (!match) {
      alert('🔒 Анкета доступна только для мэтчей. Лайкни этого пользователя, чтобы открыть анкету.');
      return;
    }
  }
  
  window.location.href = 'view-profile.html?user=' + userId;
}

function openPost(idx) {
  var post = posts[idx];
  if (!post) return;
  ensurePhotoViewerAttached();
  var p = post.profiles || {};
  currentViewedAuthorId = post.user_id;
  currentViewedPostId = post.id;
  
  markAuthorSeen(post.user_id);
  updateDotsForUser(post.user_id);
  
  document.getElementById('modal-name').textContent = p.name || 'Пользователь';
  document.getElementById('modal-city').textContent = p.city || '';
  var modalImg = document.getElementById('modal-img');
  var modalVideo = document.getElementById('modal-video');
  if (post.media_type === 'video') {
    modalVideo.src = post.photo_url || '';
    modalVideo.style.display = 'block';
    modalImg.style.display = 'none';
    modalImg.src = '';
  } else {
    modalImg.src = post.photo_url || '';
    modalImg.style.display = 'block';
    modalVideo.style.display = 'none';
    modalVideo.src = '';
  }
  document.getElementById('modal-caption').textContent = post.caption || '';
  document.getElementById('immersive-caption-overlay').textContent = post.caption || '';
  document.getElementById('modal-time').textContent = timeAgo(post.created_at);
  var av = document.getElementById('modal-avatar');
  av.innerHTML = p.photo_url ? '<img src="' + p.photo_url + '">' : '👤';

  var matchBtn = document.getElementById('match-btn');
  var matchSent = document.getElementById('match-sent');
  var actionsRow = document.getElementById('post-actions-row');
  var followBtn = document.getElementById('follow-btn');

  if (post.user_id === currentUser.id) {
    matchBtn.style.display = 'none';
    matchSent.style.display = 'none';
    actionsRow.style.display = 'flex';
    followBtn.style.display = 'none';
  } else if (myLikesGiven[post.user_id]) {
    matchBtn.style.display = 'none';
    matchSent.style.display = 'block';
    actionsRow.style.display = 'none';
    followBtn.style.display = 'block';
  } else {
    matchBtn.style.display = 'block';
    matchSent.style.display = 'none';
    actionsRow.style.display = 'none';
    followBtn.style.display = 'block';
  }

  var img = document.getElementById('modal-img');
  BlizkoPhotoViewer.reset(img);
  document.getElementById('view-modal').classList.remove('immersive');
  document.getElementById('immersive-caption-overlay').classList.remove('show');

  document.getElementById('view-modal').classList.add('show');

  loadFollowStatus(post.user_id);
  loadPostLikes(post.id);
  loadComments(post.id, post.comments_enabled !== false, post.user_id === currentUser.id);
  recordAndShowViews(post.id);
}

var photoViewerAttached = false;
function ensurePhotoViewerAttached() {
  if (photoViewerAttached) return;
  photoViewerAttached = true;
  var img = document.getElementById('modal-img');
  BlizkoPhotoViewer.attach(img, {
    onImmersiveChange: function (level) {
      document.getElementById('view-modal').classList.toggle('immersive', level > 0);
      document.getElementById('immersive-caption-overlay').classList.toggle('show', level === 1);
    }
  });
}

async function recordAndShowViews(postId) {
  await db.from('media_views').upsert({
    item_type: 'post',
    item_id: postId,
    viewer_id: currentUser.id
  }, { onConflict: 'item_type,item_id,viewer_id', ignoreDuplicates: true });

  var { count } = await db.from('media_views')
    .select('id', { count: 'exact', head: true })
    .eq('item_type', 'post')
    .eq('item_id', postId);

  document.getElementById('views-count').textContent = count || 0;

  var gridItem = document.querySelector('.grid-item[data-post-id="' + postId + '"] .grid-views');
  if (gridItem) gridItem.textContent = '👁 ' + (count || 0);
}

async function loadFollowStatus(authorId) {
  var followBtn = document.getElementById('follow-btn');
  var { data } = await db.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', authorId).maybeSingle();
  if (followBtn) {
    followBtn.classList.toggle('following', !!data);
    followBtn.textContent = data ? '✓ Подписан' : 'Подписаться';
  }
}

async function toggleFollow() {
  var authorId = currentViewedAuthorId;
  if (!authorId) return;
  var followBtn = document.getElementById('follow-btn');
  if (!followBtn) return;
  var isFollowing = followBtn.classList.contains('following');

  if (isFollowing) {
    await db.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', authorId);
  } else {
    await db.from('follows').insert({ follower_id: currentUser.id, following_id: authorId });
  }
  loadFollowStatus(authorId);
}

async function loadPostLikes(postId) {
  var { count } = await db.from('post_likes').select('id', { count: 'exact', head: true }).eq('post_id', postId);
  document.getElementById('like-count').textContent = count || 0;

  var { data: myLike } = await db.from('post_likes').select('id').eq('post_id', postId).eq('user_id', currentUser.id).maybeSingle();
  var likeBtn = document.getElementById('post-like-btn');
  if (myLike) {
    likeBtn.id = 'liked';
    likeBtn.innerHTML = '❤️ <span id="like-count">' + (count || 0) + '</span>';
  } else {
    likeBtn.removeAttribute('id');
    likeBtn.id = 'post-like-btn';
    likeBtn.innerHTML = '🤍 <span id="like-count">' + (count || 0) + '</span>';
  }
}

async function togglePostLike() {
  var postId = currentViewedPostId;
  if (!postId) return;
  var likeBtn = document.getElementById('post-like-btn') || document.getElementById('liked');
  var isLiked = likeBtn.id === 'liked';

  if (isLiked) {
    await db.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
  } else {
    await db.from('post_likes').insert({ post_id: postId, user_id: currentUser.id });
  }
  loadPostLikes(postId);
}

async function loadComments(postId, commentsEnabled, isOwner) {
  var inputRow = document.getElementById('comment-input-row');
  var disabledMsg = document.getElementById('comments-disabled-msg');
  var toggleBtn = document.getElementById('toggle-comments-btn');

  if (toggleBtn) {
    toggleBtn.classList.toggle('disabled-state', !commentsEnabled);
    toggleBtn.innerHTML = commentsEnabled ? '💬<span>Комм.</span>' : '🚫<span>Комм.</span>';
  }

  if (!commentsEnabled && !isOwner) {
    inputRow.style.display = 'none';
    disabledMsg.style.display = 'block';
  } else {
    inputRow.style.display = commentsEnabled ? 'flex' : 'none';
    disabledMsg.style.display = commentsEnabled ? 'none' : 'block';
  }

  var list = document.getElementById('comments-list');
  var { data: comments, error: cErr } = await db.from('post_comments')
    .select('*')
    .eq('post_id', postId)
    .order('created_at', { ascending: true });

  if (cErr) {
    console.error('loadComments error:', cErr);
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px 0">Ошибка загрузки комментариев</div>';
    return;
  }

  if (!comments || comments.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px 0">Пока нет комментариев</div>';
    return;
  }

  var userIds = [];
  comments.forEach(function(c) { if (userIds.indexOf(c.user_id) === -1) userIds.push(c.user_id); });

  var profilesMap = {};
  if (userIds.length > 0) {
    var { data: profs } = await db.from('profiles').select('id, name, photo_url').in('id', userIds);
    (profs || []).forEach(function(p) { profilesMap[p.id] = p; });
  }

  list.innerHTML = '';
  comments.forEach(function(c) {
    var cp = profilesMap[c.user_id] || {};
    var canDelete = c.user_id === currentUser.id || isOwner;
    var item = document.createElement('div');
    item.className = 'comment-item';
    item.innerHTML =
      '<div class="comment-avatar">' + (cp.photo_url ? '<img src="' + cp.photo_url + '">' : '👤') + '</div>' +
      '<div class="comment-body"><div class="comment-name">' + (cp.name || 'Пользователь') + '</div><div class="comment-text">' + escapeHtmlComment(c.text) + '</div></div>' +
      (canDelete ? '<button class="comment-del" onclick="deleteComment(\'' + c.id + '\')">✕</button>' : '');
    list.appendChild(item);
  });
}

function escapeHtmlComment(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendComment() {
  var input = document.getElementById('comment-input');
  var text = input.value.trim();
  if (!text || !currentViewedPostId) return;

  var { error } = await db.from('post_comments').insert({ post_id: currentViewedPostId, user_id: currentUser.id, text: text });
  if (error) { alert('Ошибка: ' + error.message); return; }

  input.value = '';
  var post = posts.find(function(p) { return p.id === currentViewedPostId; });
  loadComments(currentViewedPostId, post ? post.comments_enabled !== false : true, post ? post.user_id === currentUser.id : false);
}

async function deleteComment(commentId) {
  if (!confirm('Удалить комментарий?')) return;
  var { error } = await db.from('post_comments').delete().eq('id', commentId);
  if (error) { alert('Ошибка удаления: ' + error.message); return; }

  var post = posts.find(function(p) { return p.id === currentViewedPostId; });
  loadComments(currentViewedPostId, post ? post.comments_enabled !== false : true, post ? post.user_id === currentUser.id : false);
}

async function toggleCommentsEnabled() {
  var post = posts.find(function(p) { return p.id === currentViewedPostId; });
  if (!post) return;
  var newVal = !(post.comments_enabled !== false);
  await db.from('posts').update({ comments_enabled: newVal }).eq('id', post.id);
  post.comments_enabled = newVal;
  loadComments(post.id, newVal, true);
}

async function sharePost() {
  if (!currentViewedPostId) return;
  var shareUrl = window.location.origin + window.location.pathname.replace('feed.html', '') + 'feed.html?post=' + currentViewedPostId;

  if (navigator.clipboard) {
    try {
      await navigator.clipboard.writeText(shareUrl);
      alert('Ссылка скопирована! 🔗');
    } catch (e) {
      prompt('Скопируй ссылку:', shareUrl);
    }
  } else {
    prompt('Скопируй ссылку:', shareUrl);
  }
}

async function deleteCurrentPost() {
  if (!currentViewedPostId) return;
  if (!confirm('Удалить этот пост?')) return;

  var { error } = await db.from('posts').delete().eq('id', currentViewedPostId);
  if (error) { alert('Ошибка удаления: ' + error.message); return; }

  closeModal();
  await loadFeed();
}

function closeModal() { document.getElementById('view-modal').classList.remove('show'); }

function openMatchSheet() {
  document.getElementById('match-comment').value = '';
  document.getElementById('match-sheet-overlay').classList.add('show');
}

function closeMatchSheet() {
  document.getElementById('match-sheet-overlay').classList.remove('show');
}

async function sendMatchLike() {
  if (!currentViewedAuthorId) return;
  var comment = document.getElementById('match-comment').value.trim();

  await db.from('likes').upsert({
    from_user: currentUser.id,
    to_user: currentViewedAuthorId,
    is_like: true,
    comment: comment || null
  }, { onConflict: 'from_user,to_user' });

  myLikesGiven[currentViewedAuthorId] = true;
  closeMatchSheet();

  document.getElementById('match-btn').style.display = 'none';
  document.getElementById('match-sent').style.display = 'block';

  var { data: matchData } = await db.from('matches').select('*')
    .or('and(user1.eq.' + currentUser.id + ',user2.eq.' + currentViewedAuthorId + '),and(user1.eq.' + currentViewedAuthorId + ',user2.eq.' + currentUser.id + ')')
    .maybeSingle();

  if (matchData) {
    setTimeout(function() {
      if (confirm('🎉 Это взаимный лайк! Перейти в чат?')) {
        window.location.href = 'chat.html?match=' + matchData.id;
      }
    }, 300);
  }
}

function openUpload() { document.getElementById('upload-modal').classList.add('show'); }

function closeUpload() {
  document.getElementById('upload-modal').classList.remove('show');
  pendingPhotoUrl = null;
  pendingMediaType = 'photo';
  document.getElementById('photo-pick').innerHTML = '<div class="pick-hint">📷</div><div class="pick-text">Нажми чтобы выбрать фото или видео</div>';
  document.getElementById('caption-input').value = '';
  document.getElementById('publish-btn').disabled = true;
  document.getElementById('upload-bar').style.width = '0%';
}

async function handlePostPhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var isVideo = file.type.startsWith('video');
  pendingMediaType = isVideo ? 'video' : 'photo';

  if (isVideo && file.size > 30 * 1024 * 1024) { alert('Видео не более 30MB'); return; }
  if (!isVideo && file.size > 10 * 1024 * 1024) { alert('Фото не более 10MB'); return; }

  var reader = new FileReader();
  reader.onload = function(e) {
    if (isVideo) {
      document.getElementById('photo-pick').innerHTML = '<video src="' + e.target.result + '" muted style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover"></video>';
    } else {
      document.getElementById('photo-pick').innerHTML = '<img src="' + e.target.result + '" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover">';
    }
  };
  reader.readAsDataURL(file);
  document.getElementById('upload-progress').style.display = 'block';
  document.getElementById('upload-bar').style.width = '30%';
  var ext = file.name.split('.').pop();
  var fileName = 'posts/' + currentUser.id + '_' + Date.now() + '.' + ext;
  try {
    var r = await db.storage.from('photos').upload(fileName, file, { upsert: true, contentType: file.type });
    document.getElementById('upload-bar').style.width = '100%';
    setTimeout(function() { document.getElementById('upload-progress').style.display = 'none'; }, 600);
    if (r.error) { alert('Ошибка загрузки: ' + r.error.message); return; }
    pendingPhotoUrl = db.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
    document.getElementById('publish-btn').disabled = false;
  } catch (e) {
    document.getElementById('upload-progress').style.display = 'none';
    document.getElementById('upload-bar').style.width = '0%';
    alert('Не удалось загрузить файл (обрыв соединения или файл слишком большой). Попробуй видео покороче или при более стабильном интернете.\n\n' + (e && e.message ? e.message : e));
  }
}

async function publishPost() {
  if (!pendingPhotoUrl) return;
  var caption = document.getElementById('caption-input').value.trim();
  var btn = document.getElementById('publish-btn');
  btn.disabled = true; btn.textContent = '...';

  var profilePhotoId = null;
  var { count: galleryCount } = await db.from('profile_photos')
    .select('id', { count: 'exact', head: true })
    .eq('user_id', currentUser.id);

  if ((galleryCount || 0) < 9) {
    var { data: profPhoto, error: profErr } = await db.from('profile_photos').insert({
      user_id: currentUser.id,
      photo_url: pendingPhotoUrl,
      media_type: pendingMediaType,
      position: galleryCount || 0
    }).select().single();
    if (!profErr && profPhoto) profilePhotoId = profPhoto.id;
  }

  var { error } = await db.from('posts').insert({
    user_id: currentUser.id,
    photo_url: pendingPhotoUrl,
    caption: caption,
    media_type: pendingMediaType,
    profile_photo_id: profilePhotoId
  });
  if (error) { alert('Ошибка: ' + error.message); btn.disabled = false; btn.textContent = 'Опубликовать'; return; }

  closeUpload();
  await loadFeed();
  notifyPostSubscribers();

  if (!profilePhotoId) {
    setTimeout(function() {
      alert('Фото опубликовано в ленте. В профиль не добавлено — там уже максимум 9 фото. Удали что-нибудь в профиле, если хочешь, чтобы новые фото туда тоже попадали.');
    }, 300);
  }
}

async function notifyPostSubscribers() {
  try {
    var { data: subs } = await db.from('post_notify_subs')
      .select('subscriber_id')
      .eq('target_user_id', currentUser.id);

    if (!subs || subs.length === 0) return;

    var { data: myProfile } = await db.from('profiles').select('name').eq('id', currentUser.id).single();
    var authorName = (myProfile && myProfile.name) ? myProfile.name : 'Кто-то из подписок';

    subs.forEach(function(sub) {
      fetch(BACKEND_URL + '/api/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Api-Key': 'QHSRzsipKinthY7dJdPVN-SGTX5iL4CmLOT1bcQU1AA' },
        body: JSON.stringify({
          to_user_id: sub.subscriber_id,
          title: 'Новый пост',
          body: authorName + ' опубликовал(а) новый пост',
          type: 'new_post',
          fromUserId: currentUser.id,
          url: 'feed.html'
        })
      }).catch(function(e) { console.error('Push subscriber error:', e); });
    });
  } catch (e) {
    console.error('notifyPostSubscribers error:', e);
  }
}

init();
</script>
