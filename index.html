<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Dating</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;position:relative}
.hearts-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;bottom:-60px;opacity:0;animation:floatUp linear infinite;user-select:none}
@keyframes floatUp{0%{transform:translateY(0) rotate(-15deg) scale(0.8);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-110vh) rotate(15deg) scale(1.1);opacity:0}}
.lang-switch{position:fixed;top:16px;right:16px;z-index:10;display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px}
.lang-btn{padding:5px 11px;border:none;border-radius:16px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.lang-btn.active{background:var(--accent);color:white}
.hero{text-align:center;margin-bottom:24px;position:relative;z-index:1}
.logo-img{width:120px;height:auto;display:block;margin:0 auto 4px;filter:drop-shadow(0 4px 16px rgba(255,77,109,0.35))}
.logo{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.tagline{color:var(--muted);font-size:14px;margin-top:6px}
.pulse-wrap{display:flex;justify-content:center;margin-bottom:20px}
.pulse{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,var(--accent)55 0%,transparent 70%);display:flex;align-items:center;justify-content:center;animation:pulse 2.4s ease-in-out infinite}
.pulse-inner{width:28px;height:28px;border-radius:50%;background:var(--accent)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.18);opacity:0.7}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:400px;position:relative;z-index:1}
.tabs{display:flex;gap:4px;background:var(--input-bg);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.tab.active{background:var(--accent);color:white}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
input[type="email"],input[type="password"],input[type="text"]{width:100%;padding:14px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px}
.eye-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:38px;height:38px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);padding:0}
.eye-btn:active{color:var(--accent2)}
.eye-btn svg{width:20px;height:20px}
.consent-block{background:#1a1014;border:1px solid #3a1c24;border-radius:10px;padding:16px;margin-bottom:16px}
.consent-title{font-size:13px;font-weight:500;color:var(--accent2);margin-bottom:8px}
.consent-text{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.checkbox-row input[type="checkbox"]{width:18px;height:18px;min-width:18px;accent-color:var(--accent);cursor:pointer;margin-top:1px}
.checkbox-row span{font-size:12px;color:var(--text);line-height:1.5}
.btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:white;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.1s;margin-top:8px}
.btn:active{transform:scale(0.98);opacity:0.9}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.msg{text-align:center;font-size:13px;margin-top:12px;min-height:20px;color:var(--muted);line-height:1.5}
.msg.error{color:#ff6b6b}
.msg.success{color:#6bffb8}
.unlock-toggle{display:block;width:100%;text-align:center;background:transparent;border:none;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;margin-top:18px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.unlock-box{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.unlock-hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.result-box{margin-top:14px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.6}
.result-box code{display:block;background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:14px;letter-spacing:0.5px;color:var(--accent2);word-break:break-all}
.footer{margin-top:28px;text-align:center;position:relative;z-index:1}
.footer-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;text-decoration:none;opacity:0.8;transition:opacity 0.2s}
.footer-link:active{opacity:1}
.footer-logo{width:16px;height:16px;border-radius:4px;object-fit:cover}
</style>
</head>
<body>
<div class="hearts-canvas" id="hearts"></div>
<div class="lang-switch">
<button class="lang-btn active" onclick="setLang('ru')">RU</button>
<button class="lang-btn" onclick="setLang('en')">EN</button>
</div>
<div class="hero">
<img class="logo-img" src="logo.png" alt="Blizko">
<div class="tagline" id="tagline"></div>
</div>
<div class="card">
<div class="tabs">
<button class="tab active" id="tab_login" onclick="switchTab('login')"></button>
<button class="tab" id="tab_reg" onclick="switchTab('register')"></button>
</div>
<div id="login-form">
<div class="form-group"><label id="lbl_email1">Email</label><input type="email" id="login-email" autocomplete="email"></div>
<div class="form-group">
<label id="lbl_pass1"></label>
<div class="pass-wrap">
<input type="password" id="login-pass" autocomplete="current-password">
<button type="button" class="eye-btn" onclick="togglePass('login-pass',this)" aria-label="Показать пароль">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<button class="btn" id="btn_login" onclick="doLogin()"></button>
<div class="msg" id="login-msg"></div>
<button type="button" class="unlock-toggle" id="unlock-toggle-login" onclick="toggleUnlockBox('login')"></button>
<div class="unlock-box" id="unlock-box-login" style="display:none"></div>
</div>
<div id="register-form" style="display:none">
<div class="form-group"><label id="lbl_name"></label><input type="text" id="reg-name" maxlength="40"></div>
<div class="form-group"><label id="lbl_email2">Email</label><input type="email" id="reg-email" autocomplete="email"></div>
<div class="form-group">
<label id="lbl_pass2"></label>
<div class="pass-wrap">
<input type="password" id="reg-pass" autocomplete="new-password">
<button type="button" class="eye-btn" onclick="togglePass('reg-pass',this)" aria-label="Показать пароль">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
</button>
</div>
</div>
<div class="consent-block">
<div class="consent-title" id="consent_title"></div>
<div class="consent-text" id="consent_text"></div>
<div class="checkbox-row"><input type="checkbox" id="consent1" onchange="checkConsent()"><span id="c1"></span></div>
<div class="checkbox-row"><input type="checkbox" id="consent2" onchange="checkConsent()"><span id="c2"></span></div>
<div class="checkbox-row"><input type="checkbox" id="consent3" onchange="checkConsent()"><span id="c3"></span></div>
</div>
<button class="btn" id="reg-btn" onclick="doRegister()" disabled></button>
<div class="msg" id="reg-msg"></div>
<button type="button" class="unlock-toggle" id="unlock-toggle-reg" onclick="toggleUnlockBox('reg')"></button>
<div class="unlock-box" id="unlock-box-reg" style="display:none"></div>
</div>
</div>
<div class="footer">
<a class="footer-link" href="https://vektorizi-ru.vercel.app" target="_blank" rel="noopener">
<span id="footer_text"></span>
</a>
</div>
<script src="theme.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var BLIZKO_API_URL = (typeof window.BLIZKO_API_URL !== 'undefined') ? window.BLIZKO_API_URL : 'https://vector-chat-api.onrender.com';

var T={ru:{
tagline:'Настоящие знакомства рядом',

lbl_name:'Имя',lbl_pass:'Пароль',

unlock_err_inactive:'Этот код ещё не оплачен. Заверши оплату в Telegram-боте.',
unlock_err_device:'Этот код создан на другом устройстве. Разблокировка возможна только на том же устройстве, где была оформлена заявка.',
unlock_err_nouser:'Не удалось найти аккаунт для разблокировки.',
unlock_err_generic:'Не удалось активировать код. Попробуй ещё раз позже.',
unlock_ok_unlock:'Аккаунт разблокирован! Временный пароль для входа:',

unlock_ok_extra:'Код принят! Теперь заполни форму регистрации ниже, чтобы создать дополнительный аккаунт на этом устройстве.',
footer_by:'Сделано в Студии Вектор',
start_hint:'Забыл пароль или хочешь ещё один аккаунт на этом устройстве? Вы можете снять блокировку аккаунта или купить дополнительный аккаунт через наш Telegram-бот @Rezumeizi_bot.',
start_btn_unlock:'🔓 Забыл пароль — разблокировать аккаунт',
start_btn_extra:'➕ Купить дополнительный аккаунт',
start_submit:'Получить ссылку на оплату',

},en:{

lbl_name:'Name',lbl_pass:'Password',
btn_login:'Sign in',btn_reg:'Create account',
consent_title:'Data processing consent',

c1:'I agree to the processing of my personal data',
c2:'I am 18 years of age or older',

name_ph:'What is your name?',pass_ph:'At least 6 characters',
err_fill:'Please fill in all fields',err_pass:'Password must be at least 6 characters',
err_login:'Invalid email or password',
ok_welcome:'Welcome!',ok_created:'Account created!',
loading_in:'Signing in...',loading_reg:'Creating account...',
unlock_toggle_open:'Have an unlock or extra-account code?',
unlock_toggle_close:'Hide',

unlock_code_label:'Access code',
unlock_code_ph:'e.g. 7F3KQ9M2',

unlock_err_inactive:'This code has not been paid for yet. Finish the payment in the Telegram bot.',
unlock_err_device:'This code was created on a different device. Unlocking only works on the device the request was created from.',
unlock_err_nouser:'Could not find the account to unlock.',
unlock_err_generic:'Could not activate the code. Please try again later.',
unlock_ok_unlock:'Account unlocked! Temporary sign-in password:',
unlock_ok_unlock_hint:'Sign in with this password, then change it in your profile settings.',
unlock_ok_extra:'Code accepted! Now fill in the registration form below to create an additional account on this device.',
footer_by:'Made by Studio Vector',
start_hint:'Forgot your password or want another account on this device? You can unlock your account or buy an additional account through our Telegram bot @Rezumeizi_bot.',
start_btn_unlock:'🔓 Forgot password — unlock account',
start_btn_extra:'➕ Buy an additional account',
start_submit:'Get payment link',
start_open_bot:'Open in Telegram and pay',
start_price_label:'Price:',
start_err_no_email:'No Blizko account found for this device. Make sure you are opening the site from the device you registered on.'
}};

var lang=localStorage.getItem('lang')||'ru';

function setLang(l){lang=l;localStorage.setItem('lang',l);document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',(i===0&&l==='ru')||(i===1&&l==='en'))});applyLang()}

function applyLang(){
var t=T[lang];
document.getElementById('tagline').textContent=t.tagline;
document.getElementById('tab_login').textContent=t.tab_login;
document.getElementById('tab_reg').textContent=t.tab_reg;
document.getElementById('lbl_name').textContent=t.lbl_name;
document.getElementById('lbl_pass1').textContent=t.lbl_pass;
document.getElementById('lbl_pass2').textContent=t.lbl_pass;
document.getElementById('btn_login').textContent=t.btn_login;
document.getElementById('reg-btn').textContent=t.btn_reg;
document.getElementById('consent_title').textContent=t.consent_title;
document.getElementById('consent_text').textContent=t.consent_text;
document.getElementById('c1').textContent=t.c1;
document.getElementById('c2').textContent=t.c2;
document.getElementById('c3').textContent=t.c3;
document.getElementById('reg-name').placeholder=t.name_ph;
document.getElementById('reg-pass').placeholder=t.pass_ph;
document.getElementById('login-pass').placeholder='••••••••';
document.getElementById('unlock-toggle-login').textContent=t.unlock_toggle_open;
document.getElementById('unlock-toggle-reg').textContent=t.unlock_toggle_open;
document.getElementById('footer_text').textContent=t.footer_by;
renderUnlockBox('login');
renderUnlockBox('reg');
}

function spawnHearts(){var c=document.getElementById('hearts');var e=['❤️','🧡','💕','💖','💗','💓','💝'];for(var i=0;i<14;i++){var h=document.createElement('div');h.className='heart';h.textContent=e[Math.floor(Math.random()*e.length)];h.style.left=Math.random()*100+'vw';h.style.fontSize=(13+Math.random()*16)+'px';h.style.animationDuration=(8+Math.random()*10)+'s';h.style.animationDelay=(Math.random()*14)+'s';c.appendChild(h)}}

var db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
db.auth.getSession().then(function(r){if(r.data.session)window.location.href='feed.html'});

function switchTab(tab){document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register'))});document.getElementById('login-form').style.display=tab==='login'?'block':'none';document.getElementById('register-form').style.display=tab==='register'?'block':'none'}

function checkConsent(){document.getElementById('reg-btn').disabled=!['consent1','consent2','consent3'].every(function(id){return document.getElementById(id).checked})}

function setMsg(id,text,type){var el=document.getElementById(id);el.textContent=text;el.className='msg '+(type||'')}

function togglePass(inputId,btn){
var input=document.getElementById(inputId);
var isHidden=input.type==='password';
input.type=isHidden?'text':'password';
btn.style.color=isHidden?'var(--accent2)':'var(--muted)';
}

/* ===== device id (для привязки кода разблокировки к устройству) ===== */
function getDeviceId(){
var id=localStorage.getItem('blizko_device_id');
if(!id){
id='dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,12);
localStorage.setItem('blizko_device_id',id);
}
return id;
}

/* ===== форма ввода кода разблокировки / доп.аккаунта ===== */
function toggleUnlockBox(which){
var box=document.getElementById('unlock-box-'+which);
var open=box.style.display==='none';
box.style.display=open?'block':'none';
document.getElementById('unlock-toggle-'+which).textContent=open?T[lang].unlock_toggle_close:T[lang].unlock_toggle_open;
}

function renderUnlockBox(which){
var t=T[lang];
var box=document.getElementById('unlock-box-'+which);
box.innerHTML=
'<div class="unlock-hint">'+t.start_hint+'</div>'+

'<button class="btn btn-secondary" id="start-btn-unlock-'+which+'" onclick="startUnlockRequest(\''+which+'\')">'+t.start_btn_unlock+'</button>'+
'<div class="msg" id="start-msg-unlock-'+which+'"></div>'+
'<div id="start-result-unlock-'+which+'"></div>'+

'<button class="btn btn-secondary" style="margin-top:10px" onclick="startExtraAccountRequest(\''+which+'\')" id="start-btn-extra-'+which+'">'+t.start_btn_extra+'</button>'+
'<div class="msg" id="start-msg-extra-'+which+'"></div>'+
'<div id="start-result-extra-'+which+'"></div>'+

'<div style="height:1px;background:var(--border);margin:18px 0"></div>'+

'<div class="unlock-hint">'+t.unlock_hint+'</div>'+
'<div class="form-group"><label>'+t.unlock_code_label+'</label><input type="text" id="unlock-code-'+which+'" placeholder="'+t.unlock_code_ph+'" autocapitalize="characters" autocomplete="off"></div>'+
'<button class="btn btn-secondary" id="unlock-btn-'+which+'" onclick="redeemUnlockCode(\''+which+'\')">'+t.unlock_submit+'</button>'+
'<div class="msg" id="unlock-msg-'+which+'"></div>'+
'<div id="unlock-result-'+which+'"></div>';
}

function toggleStartForm(which,kind){
var form=document.getElementById('start-form-'+kind+'-'+which);
form.style.display=form.style.display==='none'?'block':'none';
}

function renderTelegramLink(containerId,link,priceText){
var t=T[lang];
document.getElementById(containerId).innerHTML=
'<div class="result-box">'+priceText+
'<a class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:10px" href="'+link+'" target="_blank" rel="noopener">'+t.start_open_bot+'</a></div>';
}

async function startUnlockRequest(which){
var t=T[lang];
var msgId='start-msg-unlock-'+which;
var resultId='start-result-unlock-'+which;
document.getElementById(resultId).innerHTML='';
setMsg(msgId,t.unlock_loading,'');
document.getElementById('start-btn-unlock-'+which).disabled=true;
try{
var resp=await fetch(BLIZKO_API_URL+'/api/unlock/create-request',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'unlock',device_id:getDeviceId()})
});
var data=await resp.json();
document.getElementById('start-btn-unlock-'+which).disabled=false;
if(!resp.ok){
var err=(data&&data.detail)||'unknown_error';
var msgMap={no_account_for_device:t.start_err_no_email};
setMsg(msgId,msgMap[err]||t.unlock_err_generic,'error');
return;
}
setMsg(msgId,'','');
renderTelegramLink(resultId,data.telegram_link,t.start_price_label+' '+data.price+' ₽');
}catch(e){
setMsg(msgId,t.unlock_err_generic,'error');
document.getElementById('start-btn-unlock-'+which).disabled=false;
}
}

async function startExtraAccountRequest(which){
var t=T[lang];
var msgId='start-msg-extra-'+which;
var resultId='start-result-extra-'+which;
document.getElementById(resultId).innerHTML='';
setMsg(msgId,t.unlock_loading,'');
document.getElementById('start-btn-extra-'+which).disabled=true;
try{
var resp=await fetch(BLIZKO_API_URL+'/api/unlock/create-request',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'extra_account',device_id:getDeviceId()})
});
var data=await resp.json();
document.getElementById('start-btn-extra-'+which).disabled=false;
if(!resp.ok){
setMsg(msgId,t.unlock_err_generic,'error');
return;
}
setMsg(msgId,'','');
renderTelegramLink(resultId,data.telegram_link,t.start_price_label+' '+data.price+' ₽');
}catch(e){
setMsg(msgId,t.unlock_err_generic,'error');
document.getElementById('start-btn-extra-'+which).disabled=false;
}
}

async function redeemUnlockCode(which){
var t=T[lang];
var codeInput=document.getElementById('unlock-code-'+which);
var code=codeInput.value.trim().toUpperCase();
var msgId='unlock-msg-'+which;
var resultId='unlock-result-'+which;
document.getElementById(resultId).innerHTML='';
if(!code){setMsg(msgId,t.err_fill,'error');return}
setMsg(msgId,t.unlock_loading,'');
document.getElementById('unlock-btn-'+which).disabled=true;
try{
var resp=await fetch(BLIZKO_API_URL+'/api/unlock/redeem',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({code:code,device_id:getDeviceId()})
});
var data=await resp.json();
if(!resp.ok){
var err=(data&&data.detail)||'unknown_error';
var msgMap={
invalid_code:t.unlock_err_invalid,
code_not_active:t.unlock_err_inactive,
device_mismatch:t.unlock_err_device,
no_target_user:t.unlock_err_nouser
};
setMsg(msgId,msgMap[err]||t.unlock_err_generic,'error');
document.getElementById('unlock-btn-'+which).disabled=false;
return;
}
setMsg(msgId,'','');
document.getElementById('unlock-btn-'+which).disabled=false;
if(data.type==='unlock'){
document.getElementById(resultId).innerHTML=
'<div class="result-box">'+t.unlock_ok_unlock+'<code>'+data.temp_password+'</code>'+
'<div style="margin-top:8px;color:var(--muted)">'+t.unlock_ok_unlock_hint+'</div></div>';
codeInput.value='';
}else if(data.type==='extra_account'){
setMsg(msgId,t.unlock_ok_extra,'success');
codeInput.value='';
window._blizkoExtraCode=code;
window._blizkoExtraDeviceId=getDeviceId();
if(which==='login'){switchTab('register')}
}
}catch(e){
setMsg(msgId,t.unlock_err_generic,'error');
document.getElementById('unlock-btn-'+which).disabled=false;
}
}

async function doLogin(){var t=T[lang];var email=document.getElementById('login-email').value.trim();var pass=document.getElementById('login-pass').value;if(!email||!pass){setMsg('login-msg',t.err_fill,'error');return}setMsg('login-msg',t.loading_in,'');var r=await db.auth.signInWithPassword({email:email,password:pass});if(r.error)setMsg('login-msg',t.err_login,'error');else{setMsg('login-msg',t.ok_welcome,'success');setTimeout(function(){window.location.href='feed.html'},800)}}

async function doRegister(){
var t=T[lang];
var name=document.getElementById('reg-name').value.trim();
var email=document.getElementById('reg-email').value.trim();
var pass=document.getElementById('reg-pass').value;
if(!name||!email||!pass){setMsg('reg-msg',t.err_fill,'error');return}
if(pass.length<6){setMsg('reg-msg',t.err_pass,'error');return}
setMsg('reg-msg',t.loading_reg,'');
document.getElementById('reg-btn').disabled=true;
var r=await db.auth.signUp({email:email,password:pass});
if(r.error){setMsg('reg-msg',r.error.message,'error');document.getElementById('reg-btn').disabled=false;return}
await db.from('profiles').insert({id:r.data.user.id,name:name,consent_given:true,consent_at:new Date().toISOString()});

/* привязываем аккаунт к этому устройству — понадобится для "забыл пароль" без email */
try{
await fetch(BLIZKO_API_URL+'/api/device/link-account',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({device_id:getDeviceId(),user_id:r.data.user.id})
});
}catch(e){}

/* если аккаунт создаётся по коду доп.аккаунта — подтверждаем на бэкенде */
if(window._blizkoExtraCode){
try{
await fetch(BLIZKO_API_URL+'/api/unlock/consume-extra',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({code:window._blizkoExtraCode,device_id:window._blizkoExtraDeviceId,new_user_id:r.data.user.id})
});
}catch(e){}
window._blizkoExtraCode=null;
}

setMsg('reg-msg',t.ok_created,'success');
setTimeout(function(){window.location.href='profile.html'},1000)
}

spawnHearts();setLang(lang);
</script>
</body>
</html>
