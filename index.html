<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Dating</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;position:relative}
.hearts-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;bottom:-60px;opacity:0;animation:floatUp linear infinite;user-select:none}
@keyframes floatUp{0%{transform:translateY(0) rotate(-15deg) scale(0.8);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-110vh) rotate(15deg) scale(1.1);opacity:0}}
.lang-switch{position:fixed;top:16px;right:16px;z-index:10;display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px}
.lang-btn{padding:5px 11px;border:none;border-radius:16px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.lang-btn.active{background:var(--accent);color:white}
.hero{text-align:center;margin-bottom:24px;position:relative;z-index:1}
.logo-img{width:120px;height:auto;display:block;margin:0 auto 4px;filter:drop-shadow(0 4px 16px rgba(255,77,109,0.35))}
.logo{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.tagline{color:var(--muted);font-size:14px;margin-top:6px}
.pulse-wrap{display:flex;justify-content:center;margin-bottom:20px}
.pulse{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,var(--accent)55 0%,transparent 70%);display:flex;align-items:center;justify-content:center;animation:pulse 2.4s ease-in-out infinite}
.pulse-inner{width:28px;height:28px;border-radius:50%;background:var(--accent)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.18);opacity:0.7}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:400px;position:relative;z-index:1}
.tabs{display:flex;gap:4px;background:var(--input-bg);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.tab.active{background:var(--accent);color:white}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
input[type="email"],input[type="password"],input[type="text"]{width:100%;padding:14px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px}
.eye-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:38px;height:38px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);padding:0}
.eye-btn:active{color:var(--accent2)}
.eye-btn svg{width:20px;height:20px}
.consent-block{background:#1a1014;border:1px solid #3a1c24;border-radius:10px;padding:16px;margin-bottom:16px}
.consent-title{font-size:13px;font-weight:500;color:var(--accent2);margin-bottom:8px}
.consent-text{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.checkbox-row input[type="checkbox"]{width:18px;height:18px;min-width:18px;accent-color:var(--accent);cursor:pointer;margin-top:1px}
.checkbox-row span{font-size:12px;color:var(--text);line-height:1.5}
.btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:white;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.1s;margin-top:8px}
.btn:active{transform:scale(0.98);opacity:0.9}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.msg{text-align:center;font-size:13px;margin-top:12px;min-height:20px;color:var(--muted);line-height:1.5}
.msg.error{color:#ff6b6b}
.msg.success{color:#6bffb8}
.unlock-toggle{display:block;width:100%;text-align:center;background:transparent;border:none;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;margin-top:18px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.unlock-box{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.unlock-hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.result-box{margin-top:14px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.6}
.result-box code{display:block;background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:14px;letter-spacing:0.5px;color:var(--accent2);word-break:break-all}
.copy-btn-wrap{display:flex;gap:8px;margin-top:10px}
.copy-btn-wrap button{flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:white;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.copy-btn-wrap button:active{opacity:0.7}
.footer{margin-top:28px;text-align:center;position:relative;z-index:1}
.footer-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;text-decoration:none;opacity:0.8;transition:opacity 0.2s}
.footer-link:active{opacity:1}
.footer-logo{width:16px;height:16px;border-radius:4px;object-fit:cover}
</style>
</head>

var lang=localStorage.getItem('lang')||'ru';
var HCAPTCHA_SITEKEY='8d14406a-4fb2-4d6e-acb8-d80a6b5af6fa';
var loginCaptchaId=null;
var regCaptchaId=null;
var hcaptchaReady=false;

function onHcaptchaLoad(){
  if(typeof hcaptcha==='undefined')return;
  hcaptchaReady=true;
  renderLoginCaptcha();
}

function renderLoginCaptcha(){
  if(!hcaptchaReady||loginCaptchaId!==null)return;
  var container=document.getElementById('hcaptcha-login');
  if(container&&container.offsetParent!==null){
    try{
      loginCaptchaId=hcaptcha.render('hcaptcha-login',{sitekey:HCAPTCHA_SITEKEY,size:'compact'});
    }catch(e){console.error('hCaptcha login render error:',e);}
  }
}

function renderRegCaptcha(){
  if(!hcaptchaReady||regCaptchaId!==null)return;
  var container=document.getElementById('hcaptcha-register');
  if(container&&container.offsetParent!==null){
    try{
      regCaptchaId=hcaptcha.render('hcaptcha-register',{sitekey:HCAPTCHA_SITEKEY,size:'compact'});
    }catch(e){console.error('hCaptcha reg render error:',e);}
  }
}

setTimeout(function(){
  if(!hcaptchaReady&&typeof hcaptcha!=='undefined'){
    onHcaptchaLoad();
  }
},4000);

function setLang(l){lang=l;localStorage.setItem('lang',l);document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',(i===0&&l==='ru')||(i===1&&l==='en'))});applyLang()}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register'))
  });
  document.getElementById('login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('register-form').style.display=tab==='register'?'block':'none';
  if(tab==='register'){
    setTimeout(renderRegCaptcha,100);
  }
}

function checkConsent(){document.getElementById('reg-btn').disabled=!['consent1','consent2','consent3'].every(function(id){return document.getElementById(id).checked})}

function setMsg(id,text,type){var el=document.getElementById(id);el.textContent=text;el.className='msg '+(type||'')}

function togglePass(inputId,btn){
var input=document.getElementById(inputId);
var isHidden=input.type==='password';
input.type=isHidden?'text':'password';
btn.style.color=isHidden?'var(--accent2)':'var(--muted)';
}

function getDeviceId(){
  var cookieId = document.cookie.split('; ').find(row => row.startsWith('blizko_device_id='));
  if (cookieId) {
    var id = cookieId.split('=')[1];
    if (localStorage.getItem('blizko_device_id') !== id) {
      localStorage.setItem('blizko_device_id', id);
    }
    return id;
  }
  var localId = localStorage.getItem('blizko_device_id');
  if (localId) {
    var domain = window.location.hostname;
    var cookieDomain = (domain === 'localhost' || domain === '127.0.0.1') ? '' : '; domain=' + domain.replace(/^[^.]+\./, '.');
    document.cookie = 'blizko_device_id=' + localId + '; path=/; max-age=31536000' + cookieDomain + '; SameSite=Lax';
    return localId;
  }
  var newId = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 12);
  localStorage.setItem('blizko_device_id', newId);
  var domain = window.location.hostname;
  var cookieDomain = (domain === 'localhost' || domain === '127.0.0.1') ? '' : '; domain=' + domain.replace(/^[^.]+\./, '.');
  document.cookie = 'blizko_device_id=' + newId + '; path=/; max-age=31536000' + cookieDomain + '; SameSite=Lax';
  return newId;
}

function toggleUnlockBox(which){
var box=document.getElementById('unlock-box-'+which);
var open=box.style.display==='none';
box.style.display=open?'block':'none';
document.getElementById('unlock-toggle-'+which).textContent=open?T[lang].unlock_toggle_close:T[lang].unlock_toggle_open;
}

function renderUnlockBox(which){
var t=T[lang];
var box=document.getElementById('unlock-box-'+which);
box.innerHTML=
'<div class="unlock-hint">'+t.start_hint+'</div>'+
'<button class="btn btn-secondary" id="start-btn-extra-'+which+'" onclick="startExtraAccountRequest(\''+which+'\')">'+t.start_btn_extra+'</button>'+
'<div class="msg" id="start-msg-extra-'+which+'"></div>'+
'<div id="start-result-extra-'+which+'"></div>'+
'<div style="height:1px;background:var(--border);margin:18px 0"></div>'+
'<div class="unlock-hint">'+t.unlock_hint+'</div>'+
'<div class="form-group"><label>'+t.unlock_code_label+'</label><input type="text" id="unlock-code-'+which+'" placeholder="'+t.unlock_code_ph+'" autocapitalize="characters" autocomplete="off"></div>'+
'<button class="btn btn-secondary" id="unlock-btn-'+which+'" onclick="redeemUnlockCode(\''+which+'\')">'+t.unlock_submit+'</button>'+
'<div class="msg" id="unlock-msg-'+which+'"></div>'+
'<div id="unlock-result-'+which+'"></div>';
}

function copyAndOpenBot(link, btnEl){
var t=T[lang];
navigator.clipboard.writeText(link).then(function(){}).catch(function(){});
window.open(link, '_blank');
}

function renderTelegramLink(containerId,link){
var t=T[lang];
document.getElementById(containerId).innerHTML=
'<div class="result-box">'+
'<div style="word-break:break-all;background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--muted)">'+link+'</div>'+
'<button type="button" class="btn" style="margin-top:10px" onclick="copyAndOpenBot(\''+link+'\', this)">'+t.start_copy+'</button>'+
'</div>';
}

async function startExtraAccountRequest(which){
var t=T[lang];
var msgId='start-msg-extra-'+which;
var resultId='start-result-extra-'+which;
document.getElementById(resultId).innerHTML='';
setMsg(msgId,t.unlock_loading,'');
document.getElementById('start-btn-extra-'+which).disabled=true;
try{
var resp=await fetch(BLIZKO_API_URL+'/api/unlock/create-request',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'extra_account',device_id:getDeviceId()})
});
var data=await resp.json();
document.getElementById('start-btn-extra-'+which).disabled=false;
if(!resp.ok){
setMsg(msgId,t.unlock_err_generic,'error');
return;
}
setMsg(msgId,'','');
renderTelegramLink(resultId,data.telegram_link);
}catch(e){
setMsg(msgId,t.unlock_err_generic,'error');
document.getElementById('start-btn-extra-'+which).disabled=false;
}
}

function copyText(text, btnEl){
navigator.clipboard.writeText(text).then(function(){
var orig=btnEl.textContent;
btnEl.textContent = '✅ ' + (lang==='ru'?'Скопировано!':'Copied!');
setTimeout(function(){ btnEl.textContent = orig; }, 2000);
}).catch(function(){});
}

async function redeemUnlockCode(which){
var t=T[lang];
var codeInput=document.getElementById('unlock-code-'+which);
var code=codeInput.value.trim().toUpperCase();
var msgId='unlock-msg-'+which;
var resultId='unlock-result-'+which;
document.getElementById(resultId).innerHTML='';
if(!code){setMsg(msgId,t.err_fill,'error');return}
setMsg(msgId,t.unlock_loading,'');
document.getElementById('unlock-btn-'+which).disabled=true;
try{
var resp=await fetch(BLIZKO_API_URL+'/api/unlock/redeem',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({code:code,device_id:getDeviceId()})
});
var data=await resp.json();
if(!resp.ok){
var err=(data&&data.detail)||'unknown_error';
var msgMap={
invalid_code:t.unlock_err_invalid,
code_not_active:t.unlock_err_inactive,
device_mismatch:t.unlock_err_device,
no_target_user:t.unlock_err_nouser
};
setMsg(msgId,msgMap[err]||t.unlock_err_generic,'error');
document.getElementById('unlock-btn-'+which).disabled=false;
return;
}
setMsg(msgId,'','');
document.getElementById('unlock-btn-'+which).disabled=false;
if(data.type==='unlock'){
var password = data.temp_password;
document.getElementById(resultId).innerHTML=
'<div class="result-box">'+t.unlock_ok_unlock+
'<code>'+password+'</code>'+
'<div class="copy-btn-wrap"><button onclick="copyText(\''+password+'\', this)">' + t.copy_password + '</button></div>'+
'<div style="margin-top:8px;color:var(--muted)">'+t.unlock_ok_unlock_hint+'</div></div>';
codeInput.value='';
}else if(data.type==='extra_account'){
setMsg(msgId,t.unlock_ok_extra,'success');
codeInput.value='';
window._blizkoExtraCode=code;
window._blizkoExtraDeviceId=getDeviceId();
if(which==='login'){switchTab('register')}
}
}catch(e){
setMsg(msgId,t.unlock_err_generic,'error');
document.getElementById('unlock-btn-'+which).disabled=false;
}
}

async function doLogin(){
var t=T[lang];
var email=document.getElementById('login-email').value.trim();
var pass=document.getElementById('login-pass').value;
var captchaToken=(typeof hcaptcha!=='undefined'&&loginCaptchaId!==null)?hcaptcha.getResponse(loginCaptchaId):'';
if(!email||!pass){setMsg('login-msg',t.err_fill,'error');return}
if(!captchaToken){setMsg('login-msg',t.err_captcha,'error');return}
setMsg('login-msg',t.loading_in,'');
var r=await db.auth.signInWithPassword({email:email,password:pass,options:{captchaToken:captchaToken}});
if(r.error){
setMsg('login-msg',t.err_login,'error');
if(typeof hcaptcha!=='undefined'&&loginCaptchaId!==null)hcaptcha.reset(loginCaptchaId);
}else{
setMsg('login-msg',t.ok_welcome,'success');
setTimeout(function(){window.location.href='feed.html'},800)
}
}

async function doRegister(){
var t=T[lang];
var name=document.getElementById('reg-name').value.trim();
var email=document.getElementById('reg-email').value.trim();
var pass=document.getElementById('reg-pass').value;
var captchaToken=(typeof hcaptcha!=='undefined'&&regCaptchaId!==null)?hcaptcha.getResponse(regCaptchaId):'';

if(!name||!email||!pass){setMsg('reg-msg',t.err_fill,'error');return}
if(!captchaToken){setMsg('reg-msg',t.err_captcha,'error');return}
if(pass.length<6){setMsg('reg-msg',t.err_pass,'error');return}

var deviceId = getDeviceId();
var existingAccounts = [];
try {
  var resp = await fetch(BLIZKO_API_URL + '/api/device/accounts/' + deviceId);
  if (resp.ok) {
    var data = await resp.json();
    existingAccounts = data.emails || [];
  }
} catch(e) { }

if (existingAccounts.length > 0 && !window._blizkoExtraCode) {
  setMsg('reg-msg', t.err_need_paid_code, 'error');
  return;
}

setMsg('reg-msg', t.loading_reg, '');
document.getElementById('reg-btn').disabled = true;

var r = await db.auth.signUp({email:email, password:pass, options:{captchaToken:captchaToken}});
if (r.error) {
  if (typeof hcaptcha !== 'undefined' && regCaptchaId !== null) hcaptcha.reset(regCaptchaId);
  setMsg('reg-msg', r.error.message, 'error');
  document.getElementById('reg-btn').disabled = false;
  return;
}

await db.from('profiles').insert({id:r.data.user.id, name:name, consent_given:true, consent_at:new Date().toISOString()});

try {
  await fetch(BLIZKO_API_URL + '/api/device/link-account', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({device_id:deviceId, user_id:r.data.user.id, email:email})
  });
} catch(e) {}

if (window._blizkoExtraCode) {
  try {
    await fetch(BLIZKO_API_URL + '/api/unlock/consume-extra', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:window._blizkoExtraCode, device_id:window._blizkoExtraDeviceId, new_user_id:r.data.user.id, email:email})
    });
  } catch(e) {}
  window._blizkoExtraCode = null;
}

setMsg('reg-msg', t.ok_check_email, 'success');
document.getElementById('reg-btn').disabled = false;
}

var deviceAccountCount = 0;
async function loadDeviceAccounts(){
try{
var resp=await fetch(BLIZKO_API_URL+'/api/device/accounts/'+getDeviceId());
if(!resp.ok)return;
var data=await resp.json();
var emails=data.emails||[];
deviceAccountCount=emails.length;
if(emails.length<2)return;
var t=T[lang];
var box=document.createElement('div');
box.style.marginBottom='16px';
var html='<div class="unlock-hint" style="margin-bottom:8px">'+t.choose_account_title+'<br>'+t.choose_account_hint+'</div>';
emails.forEach(function(email){
html+='<button type="button" class="btn btn-secondary" style="margin-top:6px" onclick="document.getElementById(\'login-email\').value=\''+email+'\'">'+email+'</button>';
});
box.innerHTML=html;
var loginForm=document.getElementById('login-form');
loginForm.insertBefore(box, loginForm.firstChild);
}catch(e){}
}

spawnHearts();setLang(lang);loadDeviceAccounts();
</script>
</body>
