<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Матчи</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;padding-bottom:80px}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center;transition:color 0.2s}
.back-btn:active{color:var(--text)}
.page-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;color:var(--text);flex:1}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;padding:6px 10px;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;min-width:40px;text-align:center}
.lang-btn:active{opacity:0.7}
.match-list{flex:1;overflow-y:auto}
.match-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative}
.match-item:active{background:var(--card)}
.avatar{width:54px;height:54px;border-radius:50%;background:var(--input-bg);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--border);cursor:pointer;transition:border-color 0.2s}
.avatar:active{border-color:var(--accent)}
.avatar img{width:100%;height:100%;object-fit:cover}
.match-info{flex:1;min-width:0}
.match-name{font-weight:600;font-size:15px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-city{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.match-time{font-size:11px;color:var(--muted)}
.match-delete-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;transition:color 0.2s;flex-shrink:0;line-height:1}
.match-delete-btn:active{color:var(--accent)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty-state .icon{font-size:60px;margin-bottom:16px}
.empty-state p{font-size:14px;color:var(--muted);line-height:1.6}
.empty-state .go-btn{margin-top:20px;padding:14px 28px;background:var(--accent);border:none;border-radius:12px;color:white;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.bottombar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:transparent;z-index:10;gap:6px}
.bottom-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:rgba(255,255,255,0.85);cursor:pointer;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10px;transition:opacity 0.2s;flex:1;border-radius:16px;box-shadow:0 2px 10px rgba(255,77,109,0.4)}
.bottom-btn.active{color:white;font-weight:600;opacity:1}
.bottom-btn:not(.active){opacity:0.85}
.bottom-btn .ico{font-size:22px}
.loading{padding:40px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592;</button>
  <div class="page-title" data-i18n="matches">Матчи</div>
  <div class="topbar-right">
    <button class="lang-btn" id="lang-toggle-btn" onclick="BlizkoTheme.toggleLang()">EN</button>
  </div>
</div>

<div id="match-list-wrap" class="match-list">
  <div class="loading" data-i18n="loading">⏳ Загрузка...</div>
</div>

<div class="bottombar">
  <button class="bottom-btn" onclick="window.location.href='feed.html'">
    <span class="ico">🏠</span><span data-i18n="feed">Лента</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='swipe.html'">
    <span class="ico">😍</span><span data-i18n="swipe">Знакомства</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='likes.html'">
    <span class="ico">💖</span><span data-i18n="likes">Лайки</span>
  </button>
  <button class="bottom-btn active">
    <span class="ico">💬</span><span data-i18n="matches">Матчи</span>
  </button>
  <button class="bottom-btn" onclick="window.location.href='profile.html'">
    <span class="ico">👤</span><span data-i18n="profile">Профиль</span>
  </button>
</div>

<script src="theme.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;

function timeAgo(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  var now = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return BlizkoTheme.getText('just_now');
  if (diff < 3600) return Math.floor(diff/60) + ' ' + BlizkoTheme.getText('min');
  if (diff < 86400) return Math.floor(diff/3600) + ' ' + BlizkoTheme.getText('h');
  var day = d.getDate().toString().padStart(2,'0');
  var mon = (d.getMonth()+1).toString().padStart(2,'0');
  return day + '.' + mon;
}

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;
  await loadMatches();
  BlizkoTheme.applyLang();
}

async function loadMatches() {
  var wrap = document.getElementById('match-list-wrap');

  var { data: matches, error } = await db.from('matches').select('*')
    .or('user1.eq.' + currentUser.id + ',user2.eq.' + currentUser.id)
    .order('created_at', { ascending: false });

  if (error || !matches || matches.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">💕</div><p data-i18n="no_matches">Пока нет совпадений.<br>Листай анкеты и находи людей!</p><button class="go-btn" onclick="window.location.href=\'swipe.html\'" data-i18n="go_swipe">Найти людей</button></div>';
    BlizkoTheme.applyLang();
    return;
  }

  var items = [];
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var otherId = m.user1 === currentUser.id ? m.user2 : m.user1;

    var { data: otherProfile } = await db.from('profiles').select('name,city,photo_url').eq('id', otherId).single();

    items.push({ match: m, profile: otherProfile, otherId: otherId });
  }

  wrap.innerHTML = '';
  items.forEach(function(item) {
    var p = item.profile || {};
    var matchTime = timeAgo(item.match.created_at);

    var el = document.createElement('div');
    el.className = 'match-item';
    el.onclick = function(e) {
      if (!e.target.closest('.match-delete-btn')) {
        window.location.href = 'chat.html?match=' + item.match.id;
      }
    };

    var avatarDiv = document.createElement('div');
    avatarDiv.className = 'avatar';
    avatarDiv.onclick = function(e) {
      e.stopPropagation();
      window.location.href = 'view-profile.html?user=' + item.otherId;
    };
    avatarDiv.innerHTML = p.photo_url ? '<img src="' + p.photo_url + '" onerror="this.parentNode.textContent=\'👤\'">' : '👤';

    var infoDiv = document.createElement('div');
    infoDiv.className = 'match-info';
    infoDiv.innerHTML = '<div class="match-name">' + (p.name || 'Пользователь') + '</div><div class="match-city">' + (p.city || '') + '</div>';

    var metaDiv = document.createElement('div');
    metaDiv.className = 'match-meta';
    metaDiv.innerHTML = '<div class="match-time">' + matchTime + '</div>';

    var deleteBtn = document.createElement('button');
    deleteBtn.className = 'match-delete-btn';
    deleteBtn.textContent = '🗑';
    deleteBtn.onclick = function(e) {
      e.stopPropagation();
      deleteMatch(item.match.id);
    };
    metaDiv.appendChild(deleteBtn);

    el.appendChild(avatarDiv);
    el.appendChild(infoDiv);
    el.appendChild(metaDiv);
    wrap.appendChild(el);
  });
  BlizkoTheme.applyLang();
}

async function deleteMatch(matchId) {
  if (!confirm('Удалить этот чат?')) return;
  try {
    await db.from('messages').delete().eq('match_id', matchId);
    await db.from('matches').delete().eq('id', matchId);
    await loadMatches();
  } catch(e) {
    alert('Ошибка при удалении: ' + e.message);
  }
}

init();
</script>
</body>
</html>
