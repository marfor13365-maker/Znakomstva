// ========== НОВАЯ ВЕРСИЯ deleteMatch с ПОДРОБНЫМ ЛОГОМ ==========
window.deleteMatch = async function(matchId, event) {
  if (event) {
    event.stopPropagation();
    event.preventDefault();
  }

  console.log('🔍 deleteMatch вызван с matchId:', matchId);

  if (!matchId) {
    alert('Ошибка: идентификатор матча не передан');
    return;
  }

  if (!currentUser) {
    alert('Ошибка: пользователь не авторизован');
    return;
  }

  console.log('👤 Текущий пользователь:', currentUser.id);

  // Проверим, существует ли матч и принадлежит ли он текущему пользователю
  try {
    const { data: matchData, error: fetchError } = await db
      .from('matches')
      .select('*')
      .eq('id', matchId)
      .single();

    if (fetchError) {
      console.error('❌ Не удалось найти матч:', fetchError);
      alert('Матч не найден или уже удалён: ' + fetchError.message);
      return;
    }

    console.log('📄 Найден матч:', matchData);
    if (matchData.user1 !== currentUser.id && matchData.user2 !== currentUser.id) {
      alert('Этот матч не принадлежит вам!');
      return;
    }

    if (!confirm('Удалить этот чат? Все сообщения будут удалены.')) return;

    // 1. Удаляем сообщения (если таблица есть)
    try {
      console.log('🗑 Удаляем сообщения для match_id:', matchId);
      const { error: msgError } = await db
        .from('messages')
        .delete()
        .eq('match_id', matchId);

      if (msgError) {
        console.warn('⚠️ Ошибка при удалении сообщений:', msgError);
        alert('Не удалось удалить сообщения: ' + msgError.message);
        // Не прерываем, продолжаем удалять матч
      } else {
        console.log('✅ Сообщения удалены');
      }
    } catch (msgErr) {
      console.warn('⚠️ Исключение при удалении сообщений:', msgErr);
    }

    // 2. Удаляем сам матч
    try {
      console.log('🗑 Удаляем матч с id:', matchId);
      const { error: matchError } = await db
        .from('matches')
        .delete()
        .eq('id', matchId);

      if (matchError) {
        console.error('❌ Ошибка удаления матча:', matchError);
        alert('Ошибка удаления матча: ' + matchError.message + '\n\nЭто почти всегда проблема RLS. Настройте политики в Supabase.');
        return;
      }
      console.log('✅ Матч удалён');
    } catch (matchErr) {
      console.error('❌ Исключение при удалении матча:', matchErr);
      alert('Исключение: ' + matchErr.message);
      return;
    }

    // 3. Перезагружаем список
    await loadMatches();
    console.log('🔄 Список обновлён');

  } catch (err) {
    console.error('❌ Общая ошибка:', err);
    alert('Непредвиденная ошибка: ' + err.message);
  }
};
// ==================================================

async function init() {
  try {
    var r = await db.auth.getSession();
    if (!r.data.session) { window.location.href = 'index.html'; return; }
    currentUser = r.data.session.user;
    console.log('✅ Авторизован как:', currentUser.id);
    await loadMatches();
    BlizkoTheme.applyLang();
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('match-list-wrap').innerHTML = '<div class="error-state">⚠️ Ошибка загрузки: ' + e.message + '</div>';
  }
}
