<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px;--green:#4cff9f;--purple:#b794f4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:360px}
.login-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;margin-bottom:24px;color:var(--accent)}
.topbar{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);gap:12px}
.logo{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;background:linear-gradient(135deg,#ff4d6d,#ff8fa3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-badge{font-size:10px;background:#1a0a0f;color:var(--accent);padding:2px 8px;border-radius:10px;border:1px solid var(--accent)}
.tabs{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{padding:12px 14px;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:16px;max-width:600px;margin:0 auto}
.section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;margin-top:20px}
.section-title:first-child{margin-top:0}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:24px;font-weight:600;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px}
.user-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.user-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.user-avatar{width:44px;height:44px;border-radius:50%;background:var(--input-bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.user-avatar img{width:44px;height:44px;border-radius:50%;object-fit:cover}
.user-info{flex:1;min-width:0}
.user-name{font-weight:500;font-size:14px}
.user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:11px;color:var(--muted)}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;margin-left:6px}
.badge-active{background:#0a2a1a;color:var(--green);border:1px solid var(--green)}
.badge-blocked{background:#2a0a0a;color:var(--accent);border:1px solid var(--accent)}
.badge-ai{background:#1a0f2a;color:var(--purple);border:1px solid var(--purple)}
.user-actions{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}
.act-btn.danger{border-color:#3a1010;color:#ff6b6b}
.act-btn.danger:hover{background:#2a0a0a}
.act-btn.success{border-color:#103a1a;color:var(--green)}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:white}
input[type="text"],input[type="password"],textarea,select{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;margin-bottom:10px}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
.btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity 0.2s}
.btn:active{opacity:0.8}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.msg{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
.msg.ok{color:var(--green)}
.msg.err{color:#ff6b6b}
.ai-panel{background:#1a0f2a;border:1px solid #4a2a7a;border-radius:10px;padding:14px;margin-top:10px}
.ai-panel-title{font-size:12px;color:var(--purple);font-weight:500;margin-bottom:10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.toggle-label{font-size:13px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background 0.2s;border:none;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:left 0.2s}
.toggle.on::after{left:23px}
.ad-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.ad-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;background:var(--input-bg);flex-shrink:0}
.ad-info{flex:1;min-width:0}
.ad-link{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.support-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
.support-item:hover{border-color:var(--accent)}
.support-from{font-size:12px;color:var(--accent);margin-bottom:4px}
.support-text{font-size:13px}
.support-time{font-size:10px;color:var(--muted);margin-top:4px}
.chat-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:100;display:flex;flex-direction:column;display:none}
.chat-modal.show{display:flex}
.chat-modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-modal-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-modal-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px}
.modal-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none}
.modal-input:focus{border-color:var(--accent)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:18px;cursor:pointer}
.bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5}
.bubble.admin{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.bubble.user{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.loader{text-align:center;color:var(--muted);padding:30px;font-size:13px}
.empty-list{text-align:center;color:var(--muted);padding:30px;font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
<div class="login-card">
<div class="login-title">Admin Panel</div>
<input type="password" id="admin-pass" placeholder="password">
<button class="btn" onclick="checkPass()">Enter</button>
<div class="msg" id="login-msg"></div>
</div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
<div class="topbar">
<div class="logo">Blizko</div>
<div class="admin-badge">ADMIN</div>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="showTab('users')">Users</button>
<button class="tab-btn" onclick="showTab('support')">Support</button>
<button class="tab-btn" onclick="showTab('ads')">Ads</button>
<button class="tab-btn" onclick="showTab('stats')">Stats</button>
</div>
<div class="content" id="content"></div>
</div>

<!-- CHAT MODAL -->
<div class="chat-modal" id="chat-modal">
<div class="chat-modal-header">
<button class="act-btn" onclick="closeChatModal()">&#8592; back</button>
<span id="modal-chat-name" style="font-weight:500;font-size:14px"></span>
</div>
<div class="chat-modal-messages" id="modal-messages"></div>
<div class="chat-modal-input">
<input class="modal-input" id="modal-input" placeholder="message..." onkeydown="if(event.key==='Enter')sendAdminMsg()">
<button class="send-btn" onclick="sendAdminMsg()">&#10148;</button>
</div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var ADMIN_PASS = 'admin2024blizko';
var GROQ_KEY = 'ВСТАВЬ_GROQ_KEY';
var ADMIN_USER_ID = '';

var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentAdminUser = null;
var currentChatUserId = null;
var currentSupportMatchId = null;

function checkPass() {
  var pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('login-msg').textContent = 'Wrong password';
    document.getElementById('login-msg').className = 'msg err';
  }
}

async function initAdmin() {
  var r = await db.auth.getSession();
  if (r.data.session) {
    currentAdminUser = r.data.session.user;
    ADMIN_USER_ID = currentAdminUser.id;
  }
  showTab('users');
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['users','support','ads','stats'][i] === tab);
  });
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loader">&#8987; loading...</div>';
  if (tab === 'users') loadUsers();
  else if (tab === 'support') loadSupport();
  else if (tab === 'ads') loadAds();
  else if (tab === 'stats') loadStats();
}

async function loadUsers() {
  var r = await db.from('profiles').select('*').order('created_at', {ascending: false});
  var users = r.data || [];
  var c = document.getElementById('content');
  if (users.length === 0) { c.innerHTML = '<div class="empty-list">No users yet</div>'; return; }
  var html = '<div class="section-title">All users ('+users.length+')</div>';
  c.innerHTML = html;
  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var agent = await db.from('ai_agents').select('*').eq('profile_id', u.id).single();
    var hasAi = agent.data && agent.data.is_enabled;
    var el = document.createElement('div');
    el.className = 'user-item';
    el.id = 'user-' + u.id;
    el.innerHTML = userHTML(u, hasAi, agent.data);
    c.appendChild(el);
  }
}

function userHTML(u, hasAi, agentData) {
  return '<div class="user-header">' +
    '<div class="user-avatar">' + (u.photo_url ? '<img src="'+u.photo_url+'" onerror="this.outerHTML=\'&#128100;\'">' : '&#128100;') + '</div>' +
    '<div class="user-info"><div class="user-name">' + u.name + (u.age ? ', ' + u.age : '') +
    '<span class="badge ' + (u.is_active ? 'badge-active' : 'badge-blocked') + '">' + (u.is_active ? 'active' : 'blocked') + '</span>' +
    (hasAi ? '<span class="badge badge-ai">AI</span>' : '') + '</div>' +
    '<div class="user-email">' + (u.city || '') + '</div>' +
    '<div class="user-meta">id: ' + u.id.substring(0,8) + '...</div></div></div>' +
    '<div class="user-actions">' +
    '<button class="act-btn" onclick="openSupportChat(\''+u.id+'\',\''+u.name+'\')">&#128172; message</button>' +
    '<button class="act-btn ' + (u.is_active ? 'danger' : 'success') + '" onclick="toggleBlock(\''+u.id+'\','+u.is_active+')">' + (u.is_active ? '&#128683; block' : '&#9989; unblock') + '</button>' +
    '<button class="act-btn danger" onclick="deleteUser(\''+u.id+'\')">&#128465; delete</button>' +
    '</div>' +
    '<div class="ai-panel" id="ai-'+u.id+'">' +
    '<div class="ai-panel-title">&#129504; AI Agent</div>' +
    '<div class="toggle-row"><span class="toggle-label">Enable AI for this profile</span>' +
    '<button class="toggle ' + (hasAi ? 'on' : '') + '" id="toggle-'+u.id+'" onclick="toggleAI(\''+u.id+'\',this)"></button></div>' +
    '<textarea id="persona-'+u.id+'" placeholder="AI persona prompt..." style="min-height:60px">' + (agentData ? agentData.persona : '') + '</textarea>' +
    '<button class="act-btn primary" onclick="saveAI(\''+u.id+'\')">&#128190; save AI settings</button>' +
    '</div>';
}

async function toggleBlock(userId, isActive) {
  await db.from('profiles').update({is_active: !isActive}).eq('id', userId);
  loadUsers();
}

async function deleteUser(userId) {
  if (!confirm('Delete this user?')) return;
  await db.from('profiles').delete().eq('id', userId);
  loadUsers();
}

async function toggleAI(userId, btn) {
  btn.classList.toggle('on');
}

async function saveAI(userId) {
  var isOn = document.getElementById('toggle-'+userId).classList.contains('on');
  var persona = document.getElementById('persona-'+userId).value;
  await db.from('ai_agents').upsert({profile_id: userId, is_enabled: isOn, persona: persona});
  var badge = document.querySelector('#user-'+userId+' .user-name');
  if (badge) {
    var existing = badge.querySelector('.badge-ai');
    if (isOn && !existing) badge.innerHTML += '<span class="badge badge-ai">AI</span>';
    if (!isOn && existing) existing.remove();
  }
  alert('AI settings saved!');
}

async function openSupportChat(userId, userName) {
  currentChatUserId = userId;
  document.getElementById('modal-chat-name').textContent = userName;
  document.getElementById('chat-modal').classList.add('show');
  var match = await db.from('matches').select('*').or('and(user1.eq.'+ADMIN_USER_ID+',user2.eq.'+userId+'),and(user1.eq.'+userId+',user2.eq.'+ADMIN_USER_ID+')').single();
  if (match.data) {
    currentSupportMatchId = match.data.id;
  } else {
    var nm = await db.from('matches').insert({user1: ADMIN_USER_ID, user2: userId}).select().single();
    currentSupportMatchId = nm.data ? nm.data.id : null;
  }
  loadModalMessages();
}

async function loadModalMessages() {
  if (!currentSupportMatchId) return;
  var r = await db.from('messages').select('*').eq('match_id', currentSupportMatchId).order('created_at', {ascending: true});
  var msgs = r.data || [];
  var container = document.getElementById('modal-messages');
  container.innerHTML = '';
  msgs.forEach(function(m) {
    var b = document.createElement('div');
    b.className = 'bubble ' + (m.sender_id === ADMIN_USER_ID ? 'admin' : 'user');
    b.textContent = m.text || '';
    container.appendChild(b);
  });
  container.scrollTop = container.scrollHeight;
}

async function sendAdminMsg() {
  var input = document.getElementById('modal-input');
  var text = input.value.trim();
  if (!text || !currentSupportMatchId) return;
  input.value = '';
  await db.from('messages').insert({match_id: currentSupportMatchId, sender_id: ADMIN_USER_ID, text: text, is_ai: false});
  loadModalMessages();
}

function closeChatModal() {
  document.getElementById('chat-modal').classList.remove('show');
  currentChatUserId = null;
  currentSupportMatchId = null;
}

async function loadSupport() {
  var r = await db.from('support_messages').select('*').eq('is_from_admin', false).order('created_at', {ascending: false});
  var msgs = r.data || [];
  var c = document.getElementById('content');
  if (msgs.length === 0) { c.innerHTML = '<div class="empty-list">No support messages</div>'; return; }
  c.innerHTML = '<div class="section-title">Support messages ('+msgs.length+')</div>';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    var p = await db.from('profiles').select('name').eq('id', m.user_id).single();
    var name = p.data ? p.data.name : 'Unknown';
    var el = document.createElement('div');
    el.className = 'support-item';
    el.onclick = function(uid, uname) { return function() { openSupportChat(uid, uname); }; }(m.user_id, name);
    el.innerHTML = '<div class="support-from">&#128100; ' + name + '</div><div class="support-text">' + m.text + '</div><div class="support-time">' + new Date(m.created_at).toLocaleString() + '</div>';
    c.appendChild(el);
  }
}

async function loadAds() {
  var r = await db.from('ads').select('*').order('created_at', {ascending: false});
  var ads = r.data || [];
  var c = document.getElementById('content');
  c.innerHTML = '<div class="section-title">Add new ad</div>' +
    '<input type="text" id="ad-img" placeholder="image URL">' +
    '<input type="text" id="ad-link" placeholder="link URL (https://...)">' +
    '<button class="btn" onclick="addAd()">+ Add ad</button>' +
    '<div class="msg" id="ad-msg"></div>' +
    '<div class="section-title">Active ads (' + ads.length + ')</div>';
  if (ads.length === 0) { c.innerHTML += '<div class="empty-list">No ads yet</div>'; return; }
  ads.forEach(function(ad) {
    var el = document.createElement('div');
    el.className = 'ad-item';
    el.innerHTML = '<img class="ad-thumb" src="'+ad.image_url+'" onerror="this.style.background=\'#333\'">' +
      '<div class="ad-info"><div style="font-size:13px;font-weight:500;margin-bottom:4px">' + (ad.is_active ? '&#128994; active' : '&#128308; paused') + '</div><div class="ad-link">'+ad.link+'</div></div>' +
      '<button class="act-btn danger" onclick="deleteAd('+ad.id+')">&#128465;</button>';
    c.appendChild(el);
  });
}

async function addAd() {
  var img = document.getElementById('ad-img').value.trim();
  var link = document.getElementById('ad-link').value.trim();
  var msg = document.getElementById('ad-msg');
  if (!img || !link) { msg.textContent = 'fill all fields'; msg.className = 'msg err'; return; }
  var r = await db.from('ads').insert({image_url: img, link: link, is_active: true});
  if (r.error) { msg.textContent = r.error.message; msg.className = 'msg err'; }
  else { msg.textContent = 'Ad added!'; msg.className = 'msg ok'; loadAds(); }
}

async function deleteAd(id) {
  await db.from('ads').delete().eq('id', id);
  loadAds();
}

async function loadStats() {
  var users = await db.from('profiles').select('id', {count: 'exact'});
  var matches = await db.from('matches').select('id', {count: 'exact'});
  var messages = await db.from('messages').select('id', {count: 'exact'});
  var ads = await db.from('ads').select('id', {count: 'exact'});
  var c = document.getElementById('content');
  c.innerHTML = '<div class="section-title">Statistics</div>' +
    '<div class="stat-row">' +
    '<div class="stat-card"><div class="stat-num">' + (users.count || 0) + '</div><div class="stat-label">Users</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (matches.count || 0) + '</div><div class="stat-label">Matches</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (messages.count || 0) + '</div><div class="stat-label">Messages</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (ads.count || 0) + '</div><div class="stat-label">Ads</div></div>' +
    '</div>';
}

document.getElementById('admin-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPass();
});
</script>
</body>
  </html>
