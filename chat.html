<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Чат</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center;transition:color 0.2s;flex-shrink:0}
.back-btn:active{color:var(--text)}
.chat-header{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.chat-avatar{width:38px;height:38px;border-radius:50%;background:var(--input-bg);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.messages-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex}
.msg-row.mine{justify-content:flex-end}
.msg-row.theirs{justify-content:flex-start}
.bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.bubble.mine{background:var(--accent);color:white;border-bottom-right-radius:4px}
.bubble.theirs{background:var(--card);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.bubble .time{font-size:10px;opacity:0.6;margin-top:4px;text-align:right}
.input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--bg);flex-shrink:0;padding-bottom:max(12px, env(safe-area-inset-bottom))}
.msg-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;transition:border-color 0.2s}
.msg-input:focus{border-color:var(--accent)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}
.send-btn:active{opacity:0.7}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:14px;padding:20px}
.date-divider{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;margin:4px 0}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='matches.html'">&#8592;</button>
  <div class="chat-header">
    <div class="chat-avatar" id="chat-avatar">👤</div>
    <div class="chat-name" id="chat-name">Загрузка...</div>
  </div>
</div>

<div class="messages-wrap" id="messages-wrap">
  <div class="empty-chat">⏳ Загрузка сообщений...</div>
</div>

<div class="input-wrap">
  <textarea class="msg-input" id="msg-input" placeholder="Сообщение..." rows="1"
    oninput="autoResize(this)"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
  ></textarea>
  <button class="send-btn" onclick="sendMessage()">&#10148;</button>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var matchId = null;
var otherProfile = null;
var subscription = null;

function getMatchId() {
  var params = new URLSearchParams(window.location.search);
  return params.get('match');
}

function timeStr(dateStr) {
  var d = new Date(dateStr);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollBottom() {
  var wrap = document.getElementById('messages-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function renderMessages(messages) {
  var wrap = document.getElementById('messages-wrap');
  if (!messages || messages.length === 0) {
    wrap.innerHTML = '<div class="empty-chat">Напишите первое сообщение! 👋</div>';
    return;
  }
  wrap.innerHTML = '';
  var lastDate = '';
  messages.forEach(function(msg) {
    var msgDate = new Date(msg.created_at).toLocaleDateString('ru-RU');
    if (msgDate !== lastDate) {
      var div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = msgDate;
      wrap.appendChild(div);
      lastDate = msgDate;
    }
    var isMine = msg.from_user === currentUser.id;
    var row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    var bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isMine ? 'mine' : 'theirs');
    bubble.innerHTML = '<div>' + escapeHtml(msg.text) + '</div><div class="time">' + timeStr(msg.created_at) + '</div>';
    row.appendChild(bubble);
    wrap.appendChild(row);
  });
  scrollBottom();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadMessages() {
  var { data, error } = await db.from('messages').select('*')
    .eq('match_id', matchId)
    .order('created_at', { ascending: true });
  renderMessages(data || []);

  // Отмечаем сообщения как прочитанные
  await db.from('messages').update({ read_at: new Date().toISOString() })
    .eq('match_id', matchId)
    .neq('from_user', currentUser.id)
    .is('read_at', null);
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  var { error } = await db.from('messages').insert({
    match_id: matchId,
    from_user: currentUser.id,
    text: text
  });
  if (!error) await loadMessages();
}

function subscribeToMessages() {
  subscription = db.channel('messages-' + matchId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: 'match_id=eq.' + matchId
    }, function() {
      loadMessages();
    })
    .subscribe();
}

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;

  matchId = getMatchId();
  if (!matchId) { window.location.href = 'matches.html'; return; }

  // Загружаем данные матча
  var { data: match } = await db.from('matches').select('*').eq('id', matchId).single();
  if (!match) { window.location.href = 'matches.html'; return; }

  var otherId = match.user1 === currentUser.id ? match.user2 : match.user1;
  var { data: profile } = await db.from('profiles').select('name,photo_url').eq('id', otherId).single();
  otherProfile = profile;

  if (profile) {
    document.getElementById('chat-name').textContent = profile.name || 'Пользователь';
    if (profile.photo_url) {
      document.getElementById('chat-avatar').innerHTML = '<img src="' + profile.photo_url + '" onerror="this.parentNode.textContent=\'👤\'">';
    }
  }

  await loadMessages();
  subscribeToMessages();
}

window.addEventListener('beforeunload', function() {
  if (subscription) db.removeChannel(subscription);
});

init();
</script>
</body>
</html>
