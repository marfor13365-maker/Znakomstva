<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Чат</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center;flex-shrink:0}
.chat-header{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.chat-avatar{width:38px;height:38px;border-radius:50%;background:var(--input-bg);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.messages-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex}
.msg-row.mine{justify-content:flex-end}
.msg-row.theirs{justify-content:flex-start}
.bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.bubble.mine{background:var(--accent);color:white;border-bottom-right-radius:4px}
.bubble.theirs{background:var(--card);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.bubble .time{font-size:10px;opacity:0.6;margin-top:4px;text-align:right}
.bubble img.media{max-width:100%;border-radius:12px;display:block;margin-bottom:6px;cursor:pointer}
.bubble video.media{max-width:100%;border-radius:12px;display:block;margin-bottom:6px}
.voice-msg{display:flex;align-items:center;gap:10px;min-width:180px}
.voice-msg audio{width:160px;height:32px}
.file-msg{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit}
.file-msg .file-icon{font-size:22px}
.file-msg .file-name{font-size:13px;text-decoration:underline;word-break:break-all}
.input-wrap{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--bg);flex-shrink:0;padding-bottom:max(10px, env(safe-area-inset-bottom))}
.icon-action-btn{width:38px;height:38px;border-radius:50%;background:var(--input-bg);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.icon-action-btn:active{background:var(--border)}
.icon-action-btn.recording{background:var(--accent);animation:pulse-rec 1s infinite}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:0.6}}
.msg-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;transition:border-color 0.2s}
.msg-input:focus{border-color:var(--accent)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}
.send-btn:active{opacity:0.7}
.send-btn:disabled{opacity:0.3}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:14px;padding:20px}
.date-divider{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;margin:4px 0}
.attach-menu{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:16px 16px calc(16px + env(safe-area-inset-bottom));display:none;z-index:100;box-shadow:0 -10px 30px rgba(0,0,0,0.5)}
.attach-menu.show{display:block}
.attach-menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:99;display:none}
.attach-menu-overlay.show{display:block}
.attach-options{display:flex;gap:14px;justify-content:center}
.attach-option{display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:none;color:var(--text);cursor:pointer;flex:1}
.attach-option .ico-circle{width:54px;height:54px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;font-size:24px}
.attach-option span{font-size:11px;color:var(--muted)}
.upload-progress-bar{height:3px;background:var(--border);position:fixed;top:0;left:0;right:0;z-index:200;display:none}
.upload-progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.3s}
input[type="file"]{display:none}
.preview-bar{padding:8px 16px;background:var(--card);border-top:1px solid var(--border);display:none;align-items:center;gap:10px}
.preview-bar.show{display:flex}
.preview-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--input-bg)}
.preview-info{flex:1;font-size:12px;color:var(--muted)}
.preview-cancel{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<div class="upload-progress-bar" id="upload-progress-bar"><div class="upload-progress-fill" id="upload-progress-fill"></div></div>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='matches.html'">&#8592;</button>
  <div class="chat-header">
    <div class="chat-avatar" id="chat-avatar">👤</div>
    <div class="chat-name" id="chat-name">Загрузка...</div>
  </div>
</div>

<div class="messages-wrap" id="messages-wrap">
  <div class="empty-chat">⏳ Загрузка сообщений...</div>
</div>

<div class="preview-bar" id="preview-bar">
  <img class="preview-thumb" id="preview-thumb" src="" alt="">
  <div class="preview-info" id="preview-info">Файл готов к отправке</div>
  <button class="preview-cancel" onclick="cancelAttachment()">✕</button>
</div>

<div class="input-wrap">
  <button class="icon-action-btn" id="attach-btn" onclick="openAttachMenu()">📎</button>
  <textarea class="msg-input" id="msg-input" placeholder="Сообщение..." rows="1"
    oninput="autoResize(this)"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
  ></textarea>
  <button class="icon-action-btn" id="mic-btn" onclick="toggleRecording()">🎤</button>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">&#10148;</button>
</div>

<!-- Меню вложений -->
<div class="attach-menu-overlay" id="attach-overlay" onclick="closeAttachMenu()"></div>
<div class="attach-menu" id="attach-menu">
  <div class="attach-options">
    <button class="attach-option" onclick="document.getElementById('file-photo').click()">
      <div class="ico-circle">📷</div><span>Фото</span>
    </button>
    <button class="attach-option" onclick="document.getElementById('file-video').click()">
      <div class="ico-circle">🎥</div><span>Видео</span>
    </button>
    <button class="attach-option" onclick="document.getElementById('file-doc').click()">
      <div class="ico-circle">📄</div><span>Файл</span>
    </button>
  </div>
</div>

<input type="file" id="file-photo" accept="image/*" onchange="handleFileSelect(this, 'photo')">
<input type="file" id="file-video" accept="video/*" onchange="handleFileSelect(this, 'video')">
<input type="file" id="file-doc" onchange="handleFileSelect(this, 'file')">

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var matchId = null;
var otherProfile = null;
var subscription = null;
var pendingAttachment = null; // { url, type, name }
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;

function getMatchId() {
  var params = new URLSearchParams(window.location.search);
  var val = params.get('match');
  return val ? parseInt(val, 10) : null;
}

function timeStr(dateStr) {
  var d = new Date(dateStr);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollBottom() {
  var wrap = document.getElementById('messages-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMessages(messages) {
  var wrap = document.getElementById('messages-wrap');
  if (!messages || messages.length === 0) {
    wrap.innerHTML = '<div class="empty-chat">Напишите первое сообщение! 👋</div>';
    return;
  }
  wrap.innerHTML = '';
  var lastDate = '';
  messages.forEach(function(msg) {
    var msgDate = new Date(msg.created_at).toLocaleDateString('ru-RU');
    if (msgDate !== lastDate) {
      var div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = msgDate;
      wrap.appendChild(div);
      lastDate = msgDate;
    }
    var isMine = msg.sender_id === currentUser.id;
    var row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    var bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isMine ? 'mine' : 'theirs');

    var contentHtml = '';

    if (msg.file_url && msg.file_type === 'photo') {
      contentHtml += '<img class="media" src="' + msg.file_url + '" onclick="window.open(\'' + msg.file_url + '\', \'_blank\')">';
    } else if (msg.file_url && msg.file_type === 'video') {
      contentHtml += '<video class="media" src="' + msg.file_url + '" controls></video>';
    } else if (msg.file_url && msg.file_type === 'audio') {
      contentHtml += '<div class="voice-msg">🎤<audio src="' + msg.file_url + '" controls></audio></div>';
    } else if (msg.file_url) {
      var fname = msg.file_url.split('/').pop();
      contentHtml += '<a class="file-msg" href="' + msg.file_url + '" target="_blank"><span class="file-icon">📄</span><span class="file-name">' + escapeHtml(fname) + '</span></a>';
    }

    if (msg.text) {
      contentHtml += '<div>' + escapeHtml(msg.text) + '</div>';
    }

    contentHtml += '<div class="time">' + timeStr(msg.created_at) + '</div>';
    bubble.innerHTML = contentHtml;
    row.appendChild(bubble);
    wrap.appendChild(row);
  });
  scrollBottom();
}

async function loadMessages() {
  var { data } = await db.from('messages').select('*')
    .eq('match_id', matchId)
    .order('created_at', { ascending: true });
  renderMessages(data || []);
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();

  if (!text && !pendingAttachment) return;

  var payload = {
    match_id: matchId,
    sender_id: currentUser.id,
    text: text || null
  };

  if (pendingAttachment) {
    payload.file_url = pendingAttachment.url;
    payload.file_type = pendingAttachment.type;
  }

  input.value = '';
  input.style.height = 'auto';
  cancelAttachment();

  var { error } = await db.from('messages').insert(payload);
  if (!error) {
    await loadMessages();
  } else {
    alert('Ошибка отправки: ' + error.message);
    input.value = text; // вернуть текст обратно чтобы не потерялся
  }
}

function openAttachMenu() {
  document.getElementById('attach-menu').classList.add('show');
  document.getElementById('attach-overlay').classList.add('show');
}

function closeAttachMenu() {
  document.getElementById('attach-menu').classList.remove('show');
  document.getElementById('attach-overlay').classList.remove('show');
}

async function handleFileSelect(input, kind) {
  closeAttachMenu();
  var file = input.files[0];
  if (!file) return;

  var maxSize = kind === 'video' ? 20 * 1024 * 1024 : 10 * 1024 * 1024;
  if (file.size > maxSize) {
    alert('Файл слишком большой. Максимум ' + (maxSize / 1024 / 1024) + 'MB');
    return;
  }

  document.getElementById('upload-progress-bar').style.display = 'block';
  document.getElementById('upload-progress-fill').style.width = '30%';

  var ext = file.name.split('.').pop();
  var fileName = 'chat/' + matchId + '_' + Date.now() + '.' + ext;
  var r = await db.storage.from('photos').upload(fileName, file, { upsert: true });

  document.getElementById('upload-progress-fill').style.width = '100%';
  setTimeout(function() { document.getElementById('upload-progress-bar').style.display = 'none'; }, 500);

  if (r.error) { alert('Ошибка загрузки: ' + r.error.message); return; }

  var url = db.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
  pendingAttachment = { url: url, type: kind, name: file.name };

  showPreview(kind, url, file.name);
  input.value = '';
}

function showPreview(kind, url, name) {
  var bar = document.getElementById('preview-bar');
  var thumb = document.getElementById('preview-thumb');
  var info = document.getElementById('preview-info');

  if (kind === 'photo') {
    thumb.src = url; thumb.style.display = 'block';
    info.textContent = '📷 Фото готово к отправке';
  } else if (kind === 'video') {
    thumb.style.display = 'none';
    info.textContent = '🎥 Видео готово к отправке';
  } else if (kind === 'audio') {
    thumb.style.display = 'none';
    info.textContent = '🎤 Голосовое готово к отправке';
  } else {
    thumb.style.display = 'none';
    info.textContent = '📄 ' + name;
  }
  bar.classList.add('show');
}

function cancelAttachment() {
  pendingAttachment = null;
  document.getElementById('preview-bar').classList.remove('show');
}

async function toggleRecording() {
  if (isRecording) {
    mediaRecorder.stop();
    return;
  }

  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };

    mediaRecorder.onstop = async function() {
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      stream.getTracks().forEach(function(t) { t.stop(); });

      var blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (blob.size < 500) return; // слишком короткая запись, игнор

      document.getElementById('upload-progress-bar').style.display = 'block';
      document.getElementById('upload-progress-fill').style.width = '40%';

      var fileName = 'chat/' + matchId + '_voice_' + Date.now() + '.webm';
      var r = await db.storage.from('photos').upload(fileName, blob, { upsert: true, contentType: 'audio/webm' });

      document.getElementById('upload-progress-fill').style.width = '100%';
      setTimeout(function() { document.getElementById('upload-progress-bar').style.display = 'none'; }, 500);

      if (r.error) { alert('Ошибка записи: ' + r.error.message); return; }

      var url = db.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
      pendingAttachment = { url: url, type: 'audio', name: 'Голосовое сообщение' };
      showPreview('audio', url, '');
    };

    mediaRecorder.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
  } catch (e) {
    alert('Нет доступа к микрофону: ' + e.message);
  }
}

function subscribeToMessages() {
  subscription = db.channel('messages-' + matchId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: 'match_id=eq.' + matchId
    }, function() {
      loadMessages();
    })
    .subscribe();
}

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;

  matchId = getMatchId();
  if (!matchId) { window.location.href = 'matches.html'; return; }

  var { data: match } = await db.from('matches').select('*').eq('id', matchId).single();
  if (!match) { window.location.href = 'matches.html'; return; }

  var otherId = match.user1 === currentUser.id ? match.user2 : match.user1;
  var { data: profile } = await db.from('profiles').select('name,photo_url').eq('id', otherId).single();
  otherProfile = profile;

  if (profile) {
    document.getElementById('chat-name').textContent = profile.name || 'Пользователь';
    if (profile.photo_url) {
      document.getElementById('chat-avatar').innerHTML = '<img src="' + profile.photo_url + '">';
    }
  }

  await loadMessages();
  subscribeToMessages();
}

window.addEventListener('beforeunload', function() {
  if (subscription) db.removeChannel(subscription);
});

init();
</script>
</body>
</html>
