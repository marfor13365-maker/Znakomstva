<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}
.chat-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--input-bg);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border)}
.chat-avatar img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.chat-name{font-weight:500;font-size:15px;flex:1}
.ai-badge{font-size:10px;background:#2a1f3a;color:#b794f4;padding:2px 8px;border-radius:10px;border:1px solid #6b46c1}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-wrap{display:flex;flex-direction:column}
.msg-wrap.mine{align-items:flex-end}
.msg-wrap.theirs{align-items:flex-start}
.bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.bubble.mine{background:var(--accent);color:white;border-bottom-right-radius:4px}
.bubble.theirs{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble.ai{background:#2a1f3a;border:1px solid #6b46c1;border-bottom-left-radius:4px}
.bubble-photo{max-width:200px;border-radius:12px;cursor:pointer}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px}
.ai-indicator{font-size:10px;color:#b794f4;margin-top:2px;padding:0 4px}
.input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:10px;flex-shrink:0}
.msg-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4}
.msg-input:focus{border-color:var(--accent)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}
.send-btn:active{opacity:0.7}
.photo-btn{width:40px;height:40px;border-radius:50%;background:var(--input-bg);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
input[type="file"]{display:none}
.date-divider{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.support-note{text-align:center;font-size:11px;color:var(--muted);padding:8px;background:#1a1a2e;border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>
<div class="topbar">
<button class="back-btn" onclick="window.location.href='matches.html'">&#8592;</button>
<div class="chat-avatar" id="chat-avatar">&#128100;</div>
<div class="chat-name" id="chat-name"></div>
<div class="ai-badge" id="ai-badge" style="display:none">AI</div>
</div>
<div class="messages" id="messages"></div>
<div class="input-wrap">
<button class="photo-btn" onclick="document.getElementById('photo-file').click()">&#128247;</button>
<input type="file" id="photo-file" accept="image/*" onchange="sendPhoto(this)">
<textarea class="msg-input" id="msg-input" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
<button class="send-btn" onclick="sendMessage()">&#10148;</button>
</div>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var currentUser=null,matchId=null,otherProfile=null,aiEnabled=false,aiPersona='',subscription=null;
var params=new URLSearchParams(window.location.search);
matchId=params.get('match');
var isSupport=params.get('support')==='1';
async function init(){var r=await db.auth.getSession();if(!r.data.session){window.location.href='index.html';return}currentUser=r.data.session.user;if(!matchId){window.location.href='matches.html';return}var match=await db.from('matches').select('*').eq('id',matchId).single();if(!match.data){window.location.href='matches.html';return}var otherId=match.data.user1===currentUser.id?match.data.user2:match.data.user1;var p=await db.from('profiles').select('*').eq('id',otherId).single();otherProfile=p.data;if(otherProfile){document.getElementById('chat-name').textContent=otherProfile.name+(otherProfile.age?', '+otherProfile.age:'');if(otherProfile.photo_url){document.getElementById('chat-avatar').innerHTML='<img src="'+otherProfile.photo_url+'" onerror="this.outerHTML=\'&#128100;\'">'}}var agent=await db.from('ai_agents').select('*').eq('profile_id',otherId).single();if(agent.data&&agent.data.is_enabled){aiEnabled=true;aiPersona=agent.data.persona;document.getElementById('ai-badge').style.display='block'}await loadMessages();subscribeToMessages()}
async function loadMessages(){var r=await db.from('messages').select('*').eq('match_id',matchId).order('created_at',{ascending:true});renderMessages(r.data||[])}
function renderMessages(msgs){var container=document.getElementById('messages');container.innerHTML='';if(isSupport){var note=document.createElement('div');note.className='support-note';note.textContent='support chat';container.appendChild(note)}msgs.forEach(function(m){addMessageEl(m)});container.scrollTop=container.scrollHeight}
function addMessageEl(m){var container=document.getElementById('messages');var isMine=m.sender_id===currentUser.id;var wrap=document.createElement('div');wrap.className='msg-wrap '+(isMine?'mine':'theirs');var bubble=document.createElement('div');bubble.className='bubble '+(isMine?'mine':m.is_ai?'ai':'theirs');if(m.photo_url){var img=document.createElement('img');img.src=m.photo_url;img.className='bubble-photo';img.onclick=function(){window.open(m.photo_url,'_blank')};bubble.appendChild(img)}else{bubble.textContent=m.text||''}wrap.appendChild(bubble);if(m.is_ai){var ind=document.createElement('div');ind.className='ai-indicator';ind.textContent='AI';wrap.appendChild(ind)}var time=document.createElement('div');time.className='msg-time';time.textContent=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});wrap.appendChild(time);container.appendChild(wrap);container.scrollTop=container.scrollHeight}
function subscribeToMessages(){subscription=db.channel('messages:'+matchId).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'match_id=eq.'+matchId},function(payload){if(payload.new.sender_id!==currentUser.id){addMessageEl(payload.new)}}).subscribe()}
async function sendMessage(){var input=document.getElementById('msg-input');var text=input.value.trim();if(!text)return;input.value='';autoResize(input);var r=await db.from('messages').insert({match_id:matchId,sender_id:currentUser.id,text:text,is_ai:false});if(!r.error){addMessageEl({match_id:matchId,sender_id:currentUser.id,text:text,is_ai:false,created_at:new Date().toISOString()});if(aiEnabled)await callAI(text)}}
async function callAI(userMsg){var msgs=await db.from('messages').select('*').eq('match_id',matchId).order('created_at',{ascending:true}).limit(20);var history=msgs.data||[];var conversation=history.map(function(m){return{role:m.sender_id===currentUser.id?'user':'assistant',content:m.text||'[photo]'}});var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},body:JSON.stringify({model:'llama-3.1-8b-instant',messages:[{role:'system',content:aiPersona}].concat(conversation),max_tokens:200})});var data=await resp.json();var reply=data.choices&&data.choices[0]&&data.choices[0].message?data.choices[0].message.content:'';if(reply){await db.from('messages').insert({match_id:matchId,sender_id:otherProfile.id,text:reply,is_ai:true})}}
async function sendPhoto(input){var file=input.files[0];if(!file)return;var ext=file.name.split('.').pop();var fileName='chat_'+matchId+'_'+Date.now()+'.'+ext;await db.storage.from('photos').upload(fileName,file,{upsert:true});var url=db.storage.from('photos').getPublicUrl(fileName).data.publicUrl;await db.from('messages').insert({match_id:matchId,sender_id:currentUser.id,photo_url:url,is_ai:false});addMessageEl({match_id:matchId,sender_id:currentUser.id,photo_url:url,is_ai:false,created_at:new Date().toISOString()})}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
init();
</script>
</body>
  </html>
