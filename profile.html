<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blizko - Профиль</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#ff4d6d;--accent2:#ff8fa3;--text:#f0f0f0;--muted:#888;--input-bg:#1e1e1e;--radius:16px;--green:#4cff9f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}

.topbar{display:flex;align-items:center;gap:12px;padding:16px 20px;position:fixed;top:0;left:0;right:0;background:transparent;z-index:20}
.back-btn{background:rgba(0,0,0,0.4);border:none;color:white;font-size:20px;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;background:linear-gradient(135deg,#ff4d6d,#ff8fa3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6));flex:1}
.settings-wrap{position:relative}
.settings-btn{background:rgba(0,0,0,0.4);border:none;color:white;font-size:18px;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.settings-menu{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--border);border-radius:14px;min-width:200px;box-shadow:0 8px 30px rgba(0,0,0,0.5);display:none;overflow:hidden;z-index:30}
.settings-menu.show{display:block}
.settings-menu-item{display:block;width:100%;text-align:left;padding:14px 16px;background:none;border:none;color:var(--text);font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.settings-menu-item:last-child{border-bottom:none}
.settings-menu-item.danger{color:var(--accent)}
.settings-menu-item:active{background:var(--input-bg)}

.profile-header{padding:80px 20px 20px;display:flex;flex-direction:column;align-items:center;text-align:center}
.avatar-circle{width:100px;height:100px;border-radius:50%;background:var(--input-bg);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative}
.avatar-circle img{width:100%;height:100%;object-fit:cover}
.avatar-circle .icon{font-size:28px;color:var(--muted)}
.profile-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;margin-top:12px}
.profile-meta{font-size:13px;color:var(--muted);margin-top:4px}
.avatar-actions{display:flex;gap:10px;margin-top:10px}
.avatar-action-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;text-decoration:underline}
.avatar-action-btn.danger{color:var(--accent)}
.upload-progress{width:140px;height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.upload-bar{height:100%;background:var(--accent);width:0%;transition:width 0.3s}

.stats-row{display:flex;justify-content:center;gap:30px;padding:0 20px 16px;border-bottom:1px solid var(--border)}
.stat-item{text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

.visibility-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.visibility-label{font-size:12px;color:var(--muted)}
.visibility-select{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:2px;padding-bottom:90px}
.grid-item{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--card)}
.grid-item img{width:100%;height:100%;object-fit:cover;display:block}
.grid-item .del-mini{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:white;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.empty-posts{padding:60px 20px;text-align:center;color:var(--muted)}
.empty-posts .icon{font-size:50px;margin-bottom:14px}
.empty-posts p{font-size:13px;line-height:1.6}

.bottombar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:transparent;z-index:10;gap:6px}
.bottom-btn{background:linear-gradient(135deg,#ff4d6d,#ff8fa3);border:none;color:rgba(255,255,255,0.85);cursor:pointer;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10px;transition:opacity 0.2s;flex:1;border-radius:16px;box-shadow:0 2px 10px rgba(255,77,109,0.4)}
.bottom-btn.active{color:white;font-weight:600;opacity:1}
.bottom-btn:not(.active){opacity:0.85}
.bottom-btn .ico{font-size:22px}

input[type="file"]{display:none}
.loading{padding:40px;text-align:center;color:var(--muted);font-size:14px}

/* Просмотр фото в полный размер */
.viewer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);z-index:300;display:none;align-items:center;justify-content:center}
.viewer-overlay.show{display:flex}
.viewer-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:var(--card);border:none;color:white;font-size:18px;cursor:pointer;z-index:301}
.viewer-content{max-width:100%;max-height:100%;padding:20px}
.viewer-content img,.viewer-content video{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px}

/* Модалка удаления аккаунта */
.delete-sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:300;display:none;align-items:flex-end;justify-content:center}
.delete-sheet-overlay.show{display:flex}
.delete-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:24px 20px calc(24px + env(safe-area-inset-bottom));border-top:1px solid var(--border)}
.delete-sheet-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:10px;text-align:center;color:var(--accent)}
.delete-sheet-text{font-size:13px;color:var(--muted);margin-bottom:18px;text-align:center;line-height:1.5}
.delete-sheet-actions{display:flex;gap:10px}
.btn{padding:14px 32px;background:var(--accent);border:none;border-radius:12px;color:white;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.delete-sheet-actions .btn{margin:0;flex:1}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592;</button>
  <div class="logo">Blizko</div>
  <div class="settings-wrap">
    <button class="settings-btn" onclick="toggleSettingsMenu()">⚙️</button>
    <div class="settings-menu" id="settings-menu">
      <button class="settings-menu-item" onclick="window.location.href='edit-profile.html'">Моя анкета</button>
      <button class="settings-menu-item" onclick="logout()">Выйти из аккаунта</button>
      <button class="settings-menu-item danger" onclick="openDeleteAccountSheet()">Удалить аккаунт навсегда</button>
    </div>
  </div>
</div>

<div class="profile-header">
  <div class="avatar-circle" id="avatar-circle" onclick="document.getElementById('avatar-input').click()">
    <span class="icon" id="avatar-placeholder">📷</span>
    <img id="avatar-img" src="" style="display:none">
  </div>
  <div class="profile-name" id="profile-name">Загрузка...</div>
  <div class="profile-meta" id="profile-meta"></div>
  <div class="avatar-actions">
    <button class="avatar-action-btn" onclick="document.getElementById('avatar-input').click()">Сменить фото</button>
    <button class="avatar-action-btn danger" id="avatar-delete-btn" onclick="deleteAvatar()" style="display:none">Удалить</button>
  </div>
  <div class="upload-progress" id="avatar-upload-progress"><div class="upload-bar" id="avatar-upload-bar"></div></div>
  <input type="file" id="avatar-input" accept="image/*" onchange="handleAvatarUpload(this)">
</div>

<div class="stats-row">
  <div class="stat-item">
    <div class="stat-num" id="posts-count">0</div>
    <div class="stat-label">постов</div>
  </div>
</div>

<div class="visibility-row">
  <div class="visibility-label">Кто видит мои фото в ленте</div>
  <select class="visibility-select" id="posts_visibility" onchange="savePostsVisibility()">
    <option value="all">Всем</option>
    <option value="matches">Только мэтчам</option>
    <option value="none">Никому</option>
  </select>
</div>

<div id="posts-grid-wrap">
  <div class="loading">⏳ Загрузка...</div>
</div>

<div class="bottombar">
  <button class="bottom-btn" onclick="window.location.href='feed.html'"><span class="ico">🏠</span><span>Лента</span></button>
  <button class="bottom-btn" onclick="window.location.href='swipe.html'"><span class="ico">😍</span><span>Знакомства</span></button>
  <button class="bottom-btn" onclick="window.location.href='likes.html'"><span class="ico">💖</span><span>Лайки</span></button>
  <button class="bottom-btn" onclick="window.location.href='matches.html'"><span class="ico">💬</span><span>Чаты</span></button>
  <button class="bottom-btn active"><span class="ico">👤</span><span>Профиль</span></button>
</div>

<!-- Просмотр фото -->
<div class="viewer-overlay" id="viewer-overlay">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <div class="viewer-content" id="viewer-content"></div>
</div>

<!-- Удаление аккаунта -->
<div class="delete-sheet-overlay" id="delete-account-overlay">
  <div class="delete-sheet">
    <div class="delete-sheet-title">⚠️ Удалить аккаунт навсегда?</div>
    <div class="delete-sheet-text">Будут удалены: анкета, фото, посты, лайки, чаты и сообщения. Это действие нельзя отменить.</div>
    <div class="delete-sheet-actions">
      <button class="btn btn-outline" onclick="closeDeleteAccountSheet()">Отмена</button>
      <button class="btn" style="background:var(--accent)" onclick="confirmDeleteAccount()">Удалить</button>
    </div>
  </div>
</div>

<script src="theme.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var myPosts = [];

async function init() {
  var r = await db.auth.getSession();
  if (!r.data.session) { window.location.href = 'index.html'; return; }
  currentUser = r.data.session.user;

  var { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  if (profile) {
    document.getElementById('profile-name').textContent = profile.name || 'Пользователь';
    document.getElementById('profile-meta').textContent = (profile.age ? profile.age + ' лет' : '') + (profile.city ? ' · ' + profile.city : '');
    if (profile.photo_url) showAvatar(profile.photo_url);
    document.getElementById('posts_visibility').value = profile.posts_visibility || 'all';
  }

  await loadMyPosts();
}

function showAvatar(url) {
  document.getElementById('avatar-img').src = url;
  document.getElementById('avatar-img').style.display = 'block';
  document.getElementById('avatar-placeholder').style.display = 'none';
  document.getElementById('avatar-delete-btn').style.display = 'inline-block';
}

async function deleteAvatar() {
  if (!confirm('Удалить фото профиля?')) return;
  document.getElementById('avatar-img').style.display = 'none';
  document.getElementById('avatar-placeholder').style.display = 'block';
  document.getElementById('avatar-delete-btn').style.display = 'none';
  await db.from('profiles').update({ photo_url: null }).eq('id', currentUser.id);
}

async function handleAvatarUpload(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('Фото не более 10MB'); return; }

  document.getElementById('avatar-upload-progress').style.display = 'block';
  document.getElementById('avatar-upload-bar').style.width = '40%';

  var ext = file.name.split('.').pop();
  var fileName = currentUser.id + '_' + Date.now() + '.' + ext;
  var r = await db.storage.from('photos').upload(fileName, file, { upsert: true });

  document.getElementById('avatar-upload-bar').style.width = '100%';
  setTimeout(function() { document.getElementById('avatar-upload-progress').style.display = 'none'; }, 500);

  if (r.error) { alert('Ошибка загрузки: ' + r.error.message); return; }

  var url = db.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
  showAvatar(url);
  await db.from('profiles').update({ photo_url: url }).eq('id', currentUser.id);
  input.value = '';
}

async function savePostsVisibility() {
  var val = document.getElementById('posts_visibility').value;
  await db.from('profiles').update({ posts_visibility: val }).eq('id', currentUser.id);
}

async function loadMyPosts() {
  var wrap = document.getElementById('posts-grid-wrap');
  var { data, error } = await db.from('posts')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (error) { wrap.innerHTML = '<div class="loading">Ошибка загрузки</div>'; return; }

  myPosts = data || [];
  document.getElementById('posts-count').textContent = myPosts.length;

  if (myPosts.length === 0) {
    wrap.innerHTML = '<div class="empty-posts"><div class="icon">📸</div><p>У тебя пока нет постов.<br>Опубликуй фото в общей ленте!</p></div>';
    return;
  }

  var grid = document.createElement('div');
  grid.className = 'grid';

  myPosts.forEach(function(post, idx) {
    var item = document.createElement('div');
    item.className = 'grid-item';
    item.innerHTML = '<img src="' + post.photo_url + '" loading="lazy">' +
      '<button class="del-mini" onclick="event.stopPropagation();deletePost(\'' + post.id + '\')">✕</button>';
    item.querySelector('img').onclick = function() { openViewer(idx); };
    grid.appendChild(item);
  });

  wrap.innerHTML = '';
  wrap.appendChild(grid);
}

function openViewer(idx) {
  var post = myPosts[idx];
  if (!post) return;
  document.getElementById('viewer-content').innerHTML = '<img src="' + post.photo_url + '">';
  document.getElementById('viewer-overlay').classList.add('show');
}

function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('show');
  document.getElementById('viewer-content').innerHTML = '';
}

async function deletePost(postId) {
  if (!confirm('Удалить этот пост?')) return;
  var { error } = await db.from('posts').delete().eq('id', postId);
  if (error) { alert('Ошибка удаления: ' + error.message); return; }
  await loadMyPosts();
}

function toggleSettingsMenu() {
  document.getElementById('settings-menu').classList.toggle('show');
}

document.addEventListener('click', function(e) {
  var wrap = document.querySelector('.settings-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('settings-menu').classList.remove('show');
  }
});

async function logout() {
  await db.auth.signOut();
  window.location.href = 'index.html';
}

function openDeleteAccountSheet() {
  toggleSettingsMenu();
  document.getElementById('delete-account-overlay').classList.add('show');
}

function closeDeleteAccountSheet() {
  document.getElementById('delete-account-overlay').classList.remove('show');
}

async function confirmDeleteAccount() {
  closeDeleteAccountSheet();

  try {
    await db.from('messages').delete().eq('sender_id', currentUser.id);
    await db.from('likes').delete().or('from_user.eq.' + currentUser.id + ',to_user.eq.' + currentUser.id);
    await db.from('matches').delete().or('user1.eq.' + currentUser.id + ',user2.eq.' + currentUser.id);
    await db.from('posts').delete().eq('user_id', currentUser.id);
    await db.from('profile_photos').delete().eq('user_id', currentUser.id);
    await db.from('profiles').delete().eq('id', currentUser.id);
    await db.auth.signOut();
    alert('Аккаунт удалён.');
    window.location.href = 'index.html';
  } catch (e) {
    alert('Ошибка при удалении: ' + e.message);
  }
}

init();
</script>
</body>
</html>
